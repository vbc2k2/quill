<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Quill — Notes Prototype</title>
<style>
:root {
  --bg: #f5f3ee;
  --canvas: #fdfcf7;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.08);
  --text: #1a1a1a;
  --text-muted: #6b6b6b;
  --text-faint: #999;
  --accent: #5b8c5a;
  --accent-light: rgba(91,140,90,0.13);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 10px rgba(0,0,0,0.08);
  --radius: 10px;
  --radius-sm: 6px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
  color: var(--text);
  overscroll-behavior: none;
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  font-size: 14px;
}
button { font-family: inherit; cursor: pointer; }
input { font-family: inherit; }
kbd {
  background: rgba(0,0,0,0.06);
  padding: 1px 5px;
  border-radius: 3px;
  font-family: ui-monospace, monospace;
  font-size: 11px;
}

#app {
  display: grid;
  grid-template-columns: auto 1fr;
  height: 100vh;
  width: 100vw;
}

#sidebar {
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: width 0.25s ease;
}
#sidebar.collapsed { width: 0; overflow: hidden; }
.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h1 {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.icon-btn {
  background: transparent;
  border: none;
  color: var(--text-muted);
  width: 28px; height: 28px;
  border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.icon-btn:hover, .icon-btn:active { background: rgba(0,0,0,0.05); color: var(--text); }
.icon-btn svg { width: 16px; height: 16px; }
#folder-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.folder { margin-bottom: 4px; }
.folder-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
}
.folder-header:hover { background: rgba(0,0,0,0.04); }
.folder-header .chevron {
  transition: transform 0.15s;
  color: var(--text-faint);
  cursor: pointer;
  width: 14px; height: 14px;
  flex-shrink: 0;
}
.folder.collapsed .chevron { transform: rotate(-90deg); }
.folder.collapsed .note-list { display: none; }
.folder-name { flex: 1; outline: none; cursor: text; }
.folder-actions { opacity: 0; transition: opacity 0.15s; }
.folder-header:hover .folder-actions { opacity: 1; }
.note-list { padding: 2px 0 4px 14px; }
.note-item {
  padding: 6px 8px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}
.note-item:hover { background: rgba(0,0,0,0.04); color: var(--text); }
.note-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
.note-item .note-icon { flex-shrink: 0; opacity: 0.5; }
.note-item.active .note-icon { opacity: 1; }
.note-item .note-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; outline: none; cursor: text; }
.add-note-btn, .add-folder-btn {
  display: block;
  padding: 5px 10px;
  font-size: 12px;
  color: var(--text-faint);
  background: transparent;
  border: none;
  text-align: left;
  margin-left: 14px;
  border-radius: var(--radius-sm);
  width: calc(100% - 14px);
}
.add-folder-btn { margin-left: 0; margin-top: 10px; width: 100%; }
.add-note-btn:hover, .add-folder-btn:hover { background: rgba(0,0,0,0.04); color: var(--text); }

#main { display: flex; flex-direction: column; overflow: hidden; position: relative; }
#topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  z-index: 10;
  flex-shrink: 0;
}
#note-title-input {
  flex: 0 1 220px;
  padding: 4px 8px;
  font-size: 15px;
  font-weight: 600;
  border: none;
  background: transparent;
  outline: none;
  color: var(--text);
}
#note-title-input::placeholder { color: var(--text-faint); font-weight: 500; }
.spacer { flex: 1; }

.tool-group {
  display: flex;
  gap: 2px;
  padding: 3px;
  background: rgba(0,0,0,0.04);
  border-radius: 9px;
}
.tool {
  background: transparent;
  border: none;
  padding: 6px;
  border-radius: 6px;
  color: var(--text-muted);
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.tool:hover { background: rgba(0,0,0,0.04); color: var(--text); }
.tool.active { background: var(--surface); color: var(--accent); box-shadow: var(--shadow-sm); }
.tool svg { width: 16px; height: 16px; }

#inspector {
  position: absolute;
  top: 64px;
  right: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  box-shadow: var(--shadow-md);
  z-index: 9;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-width: 220px;
  max-width: 280px;
}
#inspector.hidden { display: none; }
.inspector-section {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.inspector-label {
  font-size: 10px;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
  min-width: 44px;
}
.color-swatches { display: flex; gap: 5px; flex-wrap: wrap; }
.color-swatch {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  padding: 0;
  background-clip: padding-box;
}
.color-swatch.active { border-color: rgba(0,0,0,0.3); transform: scale(1.06); }
.width-options { display: flex; gap: 4px; }
.width-option {
  width: 32px; height: 32px;
  background: transparent;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.width-option.active { border-color: var(--accent); background: var(--accent-light); }
.width-option .dot { background: var(--text); border-radius: 50%; }
.variant-btns { display: flex; gap: 4px; }
.variant-btn {
  background: transparent;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  padding: 6px 10px;
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
}
.variant-btn.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.danger-btn {
  background: #fef1f1;
  color: #c1373d;
  border: 1px solid #f5c1c4;
  padding: 7px 12px;
  border-radius: 7px;
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
}
.hint {
  font-size: 11.5px;
  color: var(--text-muted);
  line-height: 1.5;
}

#page-tabs {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  flex-shrink: 0;
}
.page-tab {
  padding: 4px 12px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 6px;
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
}
.page-tab.active {
  background: var(--surface);
  color: var(--text);
  border-color: var(--border);
  box-shadow: var(--shadow-sm);
}
.add-page-btn {
  background: transparent;
  border: none;
  padding: 4px 8px;
  color: var(--text-faint);
  font-size: 14px;
}

#canvas-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}
#canvas {
  position: absolute;
  top: 0; left: 0;
  background: var(--canvas);
  touch-action: none;
}
#overlay-canvas {
  position: absolute;
  top: 0; left: 0;
  pointer-events: none;
  touch-action: none;
}
#overlays-container {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
.element-overlay {
  position: absolute;
  pointer-events: none;
  box-sizing: border-box;
}
body[data-tool="lasso"] .element-overlay { pointer-events: auto; }
.text-element {
  background: rgba(255,255,255,0);
  border: 1px dashed transparent;
  padding: 6px 8px;
  font-size: 16px;
  line-height: 1.5;
  outline: none;
  min-width: 100px;
  min-height: 26px;
  cursor: text;
  color: #1a1a1a;
  font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  -webkit-user-select: text;
  user-select: text;
}
body[data-tool="lasso"] .text-element { cursor: move; }
body[data-tool="lasso"] .text-element:hover { border-color: rgba(0,0,0,0.18); }
.image-element { border-radius: 2px; }
.image-element img {
  display: block;
  width: 100%; height: 100%;
  object-fit: contain;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none;
}
.table-element {
  background: rgba(255,255,255,0.85);
  border-collapse: collapse;
}
.table-element td {
  border: 1px solid rgba(0,0,0,0.15);
  padding: 6px 10px;
  font-size: 13.5px;
  min-width: 80px;
  outline: none;
  -webkit-user-select: text;
  user-select: text;
}
body[data-tool="lasso"] .element-overlay.selected {
  outline: 2px solid var(--accent);
  outline-offset: 3px;
}

#status {
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  padding: 6px 14px;
  background: rgba(26,26,26,0.85);
  color: white;
  border-radius: 16px;
  font-size: 11.5px;
  pointer-events: none;
  font-family: ui-monospace, monospace;
  opacity: 0;
  transition: opacity 0.3s;
  letter-spacing: 0.02em;
}
#status.show { opacity: 1; }

#help-hint {
  position: absolute;
  bottom: 12px;
  right: 16px;
  font-size: 11px;
  color: var(--text-faint);
  pointer-events: none;
  font-family: ui-monospace, monospace;
}

@media (max-width: 640px) {
  #sidebar { position: absolute; z-index: 20; height: 100%; box-shadow: var(--shadow-md); }
  #inspector { right: 8px; min-width: 180px; }
}
</style>
</head>
<body data-tool="pen">
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <h1>Quill</h1>
      <button class="icon-btn" id="new-folder-btn" title="New folder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
      </button>
    </div>
    <div id="folder-list"></div>
  </aside>
  <main id="main">
    <header id="topbar">
      <button class="icon-btn" id="sidebar-toggle" title="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <input id="note-title-input" placeholder="Untitled note" />
      <div class="spacer"></div>
      <div class="tool-group" id="tool-group"></div>
      <div class="tool-group">
        <button class="tool" id="undo-btn" title="Undo (⌘Z)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
        </button>
        <button class="tool" id="redo-btn" title="Redo (⌘⇧Z)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg>
        </button>
      </div>
    </header>
    <div id="inspector" class="hidden"></div>
    <div id="page-tabs"></div>
    <div id="canvas-container">
      <canvas id="canvas"></canvas>
      <canvas id="overlay-canvas"></canvas>
      <div id="overlays-container"></div>
      <div id="status"></div>
      <div id="help-hint">p pen · h highlighter · e eraser · l lasso · s shape · t text</div>
    </div>
  </main>
</div>

<input type="file" id="image-input" accept="image/*" style="display:none">

<script>
// ====== Tool definitions ======
const TOOLS = [
  { id: 'pen', label: 'Pen', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/></svg>' },
  { id: 'highlighter', label: 'Highlighter', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 11-6 6v3h3l6-6"/><path d="m22 12-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4"/></svg>' },
  { id: 'eraser', label: 'Eraser', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>' },
  { id: 'lasso', label: 'Lasso / Select', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17V8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v9"/><path d="M5 17h14"/><circle cx="12" cy="20" r="2"/></svg>' },
  { id: 'shape', label: 'Shape', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="16" x="4" y="4" rx="1"/></svg>' },
  { id: 'ruler', label: 'Ruler (straight line)', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.3 8.7 8.7 21.3a2.4 2.4 0 0 1-3.4 0L2.7 18.7a2.4 2.4 0 0 1 0-3.4L15.3 2.7a2.4 2.4 0 0 1 3.4 0l2.6 2.6a2.4 2.4 0 0 1 0 3.4Z"/><path d="m7.5 10.5 2 2"/><path d="m10.5 7.5 2 2"/><path d="m13.5 4.5 2 2"/><path d="m4.5 13.5 2 2"/></svg>' },
  { id: 'text', label: 'Text', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>' },
  { id: 'image', label: 'Insert image', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>' },
  { id: 'table', label: 'Insert table', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/></svg>' },
];

const PEN_COLORS = ['#111111', '#1e6fea', '#e23636', '#22a559', '#a855f7', '#f59e0b'];
const HIGHLIGHTER_COLORS = ['#fef08a', '#bbf7d0', '#bfdbfe', '#fbcfe8', '#fed7aa'];
const PEN_WIDTHS = [1.5, 2.5, 4];
const HIGHLIGHTER_WIDTHS = [12, 18, 26];
const ERASER_WIDTHS = [8, 14, 24];
const SHAPE_VARIANTS = [
  { id: 'rect', label: 'Rect' },
  { id: 'ellipse', label: 'Oval' },
  { id: 'line', label: 'Line' },
  { id: 'arrow', label: 'Arrow' },
];

// ====== State ======
const state = {
  folders: [],
  notes: {},
  pages: {},
  currentNoteId: null,
  currentPageId: null,
  currentTool: 'pen',
  toolSettings: {
    pen: { color: PEN_COLORS[0], width: PEN_WIDTHS[1] },
    highlighter: { color: HIGHLIGHTER_COLORS[0], width: HIGHLIGHTER_WIDTHS[1] },
    eraser: { width: ERASER_WIDTHS[1] },
    shape: { variant: 'rect', color: PEN_COLORS[0], width: 2.5 },
  },
  selectedIds: new Set(),
  history: [],
  redoStack: [],
};

const uid = () => Math.random().toString(36).slice(2, 11);
const esc = (s) => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

// ====== Persistence ======
const STORAGE_KEY = 'quill-state-v1';
let saveTimer = null;
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 400);
}
function doSave() {
  const data = {
    folders: state.folders,
    notes: state.notes,
    pages: state.pages,
    currentNoteId: state.currentNoteId,
    currentPageId: state.currentPageId,
  };
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    flashStatus('Saved');
  } catch (e) {
    flashStatus('Save failed: ' + e.message);
  }
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const parsed = JSON.parse(raw);
    state.folders = parsed.folders || [];
    state.notes = parsed.notes || {};
    state.pages = parsed.pages || {};
    state.currentNoteId = parsed.currentNoteId;
    state.currentPageId = parsed.currentPageId;
    return true;
  } catch (e) { return false; }
}

function seed() {
  const folderId = uid();
  const noteId = uid();
  const pageId = uid();
  state.folders = [{ id: folderId, name: 'My Notebook', expanded: true, noteIds: [noteId] }];
  state.notes[noteId] = { id: noteId, title: 'Welcome', folderId, pageIds: [pageId] };
  state.pages[pageId] = { id: pageId, elements: [] };
  state.currentNoteId = noteId;
  state.currentPageId = pageId;
}

// ====== Canvas setup ======
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
const overlayCanvas = document.getElementById('overlay-canvas');
const overlayCtx = overlayCanvas.getContext('2d', { alpha: true });
const overlaysContainer = document.getElementById('overlays-container');

let dpr = 1;
function resize() {
  dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  for (const c of [canvas, overlayCanvas]) {
    c.width = Math.round(rect.width * dpr);
    c.height = Math.round(rect.height * dpr);
    c.style.width = rect.width + 'px';
    c.style.height = rect.height + 'px';
  }
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  overlayCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  render();
}

// ====== Render ======
function currentPage() { return state.pages[state.currentPageId]; }

function render() {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  ctx.fillStyle = '#fdfcf7';
  ctx.fillRect(0, 0, w, h);
  drawPaperLines(w, h);

  const page = currentPage();
  if (!page) return;

  for (const el of page.elements) {
    if (el.type === 'stroke') drawStroke(el);
    else if (el.type === 'shape') drawShape(el);
  }
  renderOverlays();
}

function drawPaperLines(w, h) {
  ctx.strokeStyle = 'rgba(180, 170, 150, 0.16)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let y = 40; y < h; y += 32) {
    ctx.moveTo(0, y + 0.5);
    ctx.lineTo(w, y + 0.5);
  }
  ctx.stroke();
}

function drawStroke(el) {
  const pts = el.points;
  if (pts.length === 0) return;

  ctx.save();
  if (el.tool === 'highlighter') {
    ctx.globalAlpha = 0.42;
  }
  ctx.strokeStyle = el.color;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  if (pts.length === 1) {
    const w = el.tool === 'highlighter' ? el.width : (el.width * 0.5 + pts[0].p * el.width);
    ctx.fillStyle = el.color;
    ctx.beginPath();
    ctx.arc(pts[0].x, pts[0].y, w / 2, 0, Math.PI * 2);
    ctx.fill();
  } else {
    if (el.tool === 'highlighter') {
      ctx.lineWidth = el.width;
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.stroke();
    } else {
      for (let i = 1; i < pts.length; i++) {
        const a = pts[i-1], b = pts[i];
        const w = el.width * 0.5 + ((a.p + b.p) / 2) * el.width;
        ctx.lineWidth = w;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }
  }

  if (state.selectedIds.has(el.id)) drawSelectionBox(el);
  ctx.restore();
}

function drawShape(el) {
  ctx.save();
  ctx.strokeStyle = el.color;
  ctx.lineWidth = el.width;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  const x = el.x, y = el.y, w = el.w, h = el.h;
  if (el.variant === 'rect') {
    ctx.rect(x, y, w, h);
  } else if (el.variant === 'ellipse') {
    ctx.ellipse(x + w/2, y + h/2, Math.abs(w)/2, Math.abs(h)/2, 0, 0, Math.PI*2);
  } else if (el.variant === 'line') {
    ctx.moveTo(x, y); ctx.lineTo(x + w, y + h);
  } else if (el.variant === 'arrow') {
    const x2 = x + w, y2 = y + h;
    ctx.moveTo(x, y); ctx.lineTo(x2, y2);
    const angle = Math.atan2(h, w);
    const head = 12 + el.width;
    ctx.lineTo(x2 - head * Math.cos(angle - 0.4), y2 - head * Math.sin(angle - 0.4));
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - head * Math.cos(angle + 0.4), y2 - head * Math.sin(angle + 0.4));
  }
  ctx.stroke();
  if (state.selectedIds.has(el.id)) drawSelectionBox(el);
  ctx.restore();
}

function drawSelectionBox(el) {
  const bbox = getBBox(el);
  if (!bbox) return;
  ctx.save();
  ctx.strokeStyle = 'rgba(91,140,90,0.85)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([5, 4]);
  const pad = 5;
  ctx.strokeRect(bbox.x - pad, bbox.y - pad, bbox.w + pad*2, bbox.h + pad*2);
  ctx.restore();
}

function getBBox(el) {
  if (el.type === 'stroke') {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const p of el.points) {
      if (p.x < minX) minX = p.x;
      if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.y > maxY) maxY = p.y;
    }
    return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
  }
  if (el.type === 'shape') {
    return { x: Math.min(el.x, el.x+el.w), y: Math.min(el.y, el.y+el.h), w: Math.abs(el.w), h: Math.abs(el.h) };
  }
  if (el.type === 'text' || el.type === 'image' || el.type === 'table') {
    return { x: el.x, y: el.y, w: el.w, h: el.h };
  }
  return null;
}

function pointInPolygon(point, polygon) {
  let inside = false;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const xi = polygon[i].x, yi = polygon[i].y;
    const xj = polygon[j].x, yj = polygon[j].y;
    if (((yi > point.y) !== (yj > point.y)) &&
        (point.x < (xj - xi) * (point.y - yi) / (yj - yi + 1e-9) + xi)) {
      inside = !inside;
    }
  }
  return inside;
}

// ====== DOM Overlays (text, image, table) ======
function renderOverlays() {
  overlaysContainer.innerHTML = '';
  const page = currentPage();
  if (!page) return;
  for (const el of page.elements) {
    if (el.type === 'text') {
      const div = document.createElement('div');
      div.className = 'element-overlay text-element' + (state.selectedIds.has(el.id) ? ' selected' : '');
      div.dataset.id = el.id;
      div.contentEditable = 'true';
      div.style.left = el.x + 'px';
      div.style.top = el.y + 'px';
      div.style.minWidth = (el.w || 200) + 'px';
      div.style.color = el.color || '#1a1a1a';
      div.textContent = el.content || '';
      div.addEventListener('input', () => { el.content = div.textContent; save(); });
      div.addEventListener('blur', () => {
        if (!el.content || !el.content.trim()) {
          page.elements = page.elements.filter(e => e.id !== el.id);
          render(); save();
        }
      });
      attachOverlayDrag(div, el);
      overlaysContainer.appendChild(div);
    } else if (el.type === 'image') {
      const div = document.createElement('div');
      div.className = 'element-overlay image-element' + (state.selectedIds.has(el.id) ? ' selected' : '');
      div.dataset.id = el.id;
      div.style.left = el.x + 'px';
      div.style.top = el.y + 'px';
      div.style.width = el.w + 'px';
      div.style.height = el.h + 'px';
      const img = document.createElement('img');
      img.src = el.src;
      div.appendChild(img);
      attachOverlayDrag(div, el);
      overlaysContainer.appendChild(div);
    } else if (el.type === 'table') {
      const tbl = document.createElement('table');
      tbl.className = 'element-overlay table-element' + (state.selectedIds.has(el.id) ? ' selected' : '');
      tbl.dataset.id = el.id;
      tbl.style.left = el.x + 'px';
      tbl.style.top = el.y + 'px';
      for (let r = 0; r < el.rows; r++) {
        const tr = document.createElement('tr');
        for (let c = 0; c < el.cols; c++) {
          const td = document.createElement('td');
          td.contentEditable = 'true';
          td.textContent = (el.cells[r] && el.cells[r][c]) || '';
          td.addEventListener('input', () => {
            if (!el.cells[r]) el.cells[r] = [];
            el.cells[r][c] = td.textContent;
            save();
          });
          tr.appendChild(td);
        }
        tbl.appendChild(tr);
      }
      attachOverlayDrag(tbl, el);
      overlaysContainer.appendChild(tbl);
    }
  }
}

function attachOverlayDrag(node, el) {
  let dragging = false;
  let startX = 0, startY = 0, origX = 0, origY = 0;
  let snap = false;
  node.addEventListener('pointerdown', (ev) => {
    if (state.currentTool !== 'lasso') return;
    if (ev.target.isContentEditable && document.activeElement === ev.target) return;
    dragging = true; snap = false;
    startX = ev.clientX; startY = ev.clientY;
    origX = el.x; origY = el.y;
    state.selectedIds.clear();
    state.selectedIds.add(el.id);
    renderInspector(); render();
    try { node.setPointerCapture(ev.pointerId); } catch(e){}
    ev.stopPropagation();
  });
  node.addEventListener('pointermove', (ev) => {
    if (!dragging) return;
    el.x = origX + (ev.clientX - startX);
    el.y = origY + (ev.clientY - startY);
    node.style.left = el.x + 'px';
    node.style.top = el.y + 'px';
    if (!snap) { snapshot(); snap = true; }
    ev.stopPropagation();
  });
  const endDrag = (ev) => {
    if (!dragging) return;
    dragging = false;
    if (snap) save();
    ev.stopPropagation();
  };
  node.addEventListener('pointerup', endDrag);
  node.addEventListener('pointercancel', endDrag);
}

// ====== History ======
function snapshot() {
  state.history.push(JSON.stringify({ folders: state.folders, notes: state.notes, pages: state.pages }));
  if (state.history.length > 40) state.history.shift();
  state.redoStack = [];
}
function applySnapshot(json) {
  const p = JSON.parse(json);
  state.folders = p.folders; state.notes = p.notes; state.pages = p.pages;
  if (!state.notes[state.currentNoteId]) {
    const first = state.folders[0];
    if (first && first.noteIds[0]) state.currentNoteId = first.noteIds[0];
  }
  if (state.notes[state.currentNoteId] && !state.notes[state.currentNoteId].pageIds.includes(state.currentPageId)) {
    state.currentPageId = state.notes[state.currentNoteId].pageIds[0];
  }
}
function undo() {
  if (state.history.length === 0) return;
  state.redoStack.push(JSON.stringify({ folders: state.folders, notes: state.notes, pages: state.pages }));
  applySnapshot(state.history.pop());
  renderSidebar(); renderPageTabs(); render(); save();
}
function redo() {
  if (state.redoStack.length === 0) return;
  state.history.push(JSON.stringify({ folders: state.folders, notes: state.notes, pages: state.pages }));
  applySnapshot(state.redoStack.pop());
  renderSidebar(); renderPageTabs(); render(); save();
}

// ====== Pointer wiring ======
let activeDraw = null;
let isPointerDown = false;

function getPointerPos(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

canvas.addEventListener('pointerdown', (e) => {
  if (e.pointerType === 'touch') return;
  try { canvas.setPointerCapture(e.pointerId); } catch(err){}
  e.preventDefault();
  isPointerDown = true;
  const t = tools[state.currentTool];
  if (t && t.down) t.down(e);
});
canvas.addEventListener('pointermove', (e) => {
  if (!isPointerDown) return;
  if (e.pointerType === 'touch') return;
  e.preventDefault();
  const t = tools[state.currentTool];
  if (t && t.move) t.move(e);
});
function endCanvasPointer(e) {
  if (!isPointerDown) return;
  isPointerDown = false;
  const t = tools[state.currentTool];
  if (t && t.up) t.up(e);
}
canvas.addEventListener('pointerup', endCanvasPointer);
canvas.addEventListener('pointercancel', endCanvasPointer);
canvas.addEventListener('pointerleave', endCanvasPointer);

// ====== Tool implementations ======
const tools = {
  pen: {
    down(e) {
      const pos = getPointerPos(e);
      const s = state.toolSettings.pen;
      activeDraw = {
        id: uid(), type: 'stroke', tool: 'pen',
        color: s.color, width: s.width,
        points: [{ x: pos.x, y: pos.y, p: e.pressure || 0.5 }],
      };
    },
    move(e) {
      if (!activeDraw) return;
      const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
      for (const ce of events) {
        const pos = getPointerPos(ce);
        const np = { x: pos.x, y: pos.y, p: ce.pressure || 0.5 };
        const prev = activeDraw.points[activeDraw.points.length - 1];
        const dx = np.x - prev.x, dy = np.y - prev.y;
        if (dx*dx + dy*dy < 1.5) continue;
        ctx.strokeStyle = activeDraw.color;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = activeDraw.width * 0.5 + ((prev.p + np.p) / 2) * activeDraw.width;
        ctx.beginPath();
        ctx.moveTo(prev.x, prev.y);
        ctx.lineTo(np.x, np.y);
        ctx.stroke();
        activeDraw.points.push(np);
      }
    },
    up() {
      if (!activeDraw) return;
      if (activeDraw.points.length > 0) {
        snapshot();
        currentPage().elements.push(activeDraw);
        save();
      }
      activeDraw = null;
    },
  },

  highlighter: {
    down(e) {
      const pos = getPointerPos(e);
      const s = state.toolSettings.highlighter;
      activeDraw = {
        id: uid(), type: 'stroke', tool: 'highlighter',
        color: s.color, width: s.width,
        points: [{ x: pos.x, y: pos.y, p: 1 }],
      };
    },
    move(e) {
      if (!activeDraw) return;
      const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
      const pts = activeDraw.points;
      for (const ce of events) {
        const pos = getPointerPos(ce);
        const prev = pts[pts.length-1];
        const dx = pos.x - prev.x, dy = pos.y - prev.y;
        if (dx*dx + dy*dy < 4) continue;
        pts.push({ x: pos.x, y: pos.y, p: 1 });
      }
      render();
      drawStroke(activeDraw);
    },
    up() {
      if (!activeDraw) return;
      if (activeDraw.points.length > 0) {
        snapshot();
        currentPage().elements.push(activeDraw);
        save();
      }
      activeDraw = null;
      render();
    },
  },

  eraser: {
    snapshotTaken: false,
    down(e) {
      this.snapshotTaken = false;
      this.move(e);
    },
    move(e) {
      const pos = getPointerPos(e);
      const r = state.toolSettings.eraser.width;
      const page = currentPage();
      const remove = new Set();
      for (const el of page.elements) {
        if (el.type !== 'stroke' && el.type !== 'shape') continue;
        const bbox = getBBox(el);
        if (!bbox) continue;
        if (pos.x < bbox.x - r || pos.x > bbox.x + bbox.w + r ||
            pos.y < bbox.y - r || pos.y > bbox.y + bbox.h + r) continue;
        if (el.type === 'stroke') {
          for (const p of el.points) {
            const dx = p.x - pos.x, dy = p.y - pos.y;
            if (dx*dx + dy*dy < r*r) { remove.add(el.id); break; }
          }
        } else {
          remove.add(el.id);
        }
      }
      if (remove.size > 0) {
        if (!this.snapshotTaken) { snapshot(); this.snapshotTaken = true; }
        page.elements = page.elements.filter(e => !remove.has(e.id));
        render();
      }
      overlayCtx.clearRect(0, 0, overlayCanvas.clientWidth, overlayCanvas.clientHeight);
      overlayCtx.strokeStyle = 'rgba(0,0,0,0.4)';
      overlayCtx.lineWidth = 1;
      overlayCtx.beginPath();
      overlayCtx.arc(pos.x, pos.y, r, 0, Math.PI*2);
      overlayCtx.stroke();
    },
    up() {
      overlayCtx.clearRect(0, 0, overlayCanvas.clientWidth, overlayCanvas.clientHeight);
      if (this.snapshotTaken) save();
    },
  },

  lasso: {
    path: null,
    dragging: false,
    dragSnap: false,
    dragStart: null,
    down(e) {
      const pos = getPointerPos(e);
      // If clicked inside an existing selection, start drag
      if (state.selectedIds.size > 0) {
        const page = currentPage();
        for (const id of state.selectedIds) {
          const el = page.elements.find(x => x.id === id);
          if (!el) continue;
          const bbox = getBBox(el);
          if (!bbox) continue;
          if (pos.x >= bbox.x - 8 && pos.x <= bbox.x + bbox.w + 8 &&
              pos.y >= bbox.y - 8 && pos.y <= bbox.y + bbox.h + 8) {
            this.dragging = true;
            this.dragStart = pos;
            this.dragSnap = false;
            return;
          }
        }
      }
      this.dragging = false;
      this.path = [pos];
      state.selectedIds.clear();
      renderInspector(); render();
    },
    move(e) {
      const pos = getPointerPos(e);
      if (this.dragging) {
        const dx = pos.x - this.dragStart.x;
        const dy = pos.y - this.dragStart.y;
        if (!this.dragSnap) { snapshot(); this.dragSnap = true; }
        const page = currentPage();
        for (const id of state.selectedIds) {
          const el = page.elements.find(x => x.id === id);
          if (!el) continue;
          translateEl(el, dx, dy);
        }
        this.dragStart = pos;
        render();
        return;
      }
      if (!this.path) return;
      this.path.push(pos);
      overlayCtx.clearRect(0, 0, overlayCanvas.clientWidth, overlayCanvas.clientHeight);
      overlayCtx.strokeStyle = 'rgba(91,140,90,0.9)';
      overlayCtx.fillStyle = 'rgba(91,140,90,0.08)';
      overlayCtx.lineWidth = 1.5;
      overlayCtx.setLineDash([5, 3]);
      overlayCtx.beginPath();
      overlayCtx.moveTo(this.path[0].x, this.path[0].y);
      for (let i = 1; i < this.path.length; i++) overlayCtx.lineTo(this.path[i].x, this.path[i].y);
      overlayCtx.closePath();
      overlayCtx.fill();
      overlayCtx.stroke();
      overlayCtx.setLineDash([]);
    },
    up(e) {
      if (this.dragging) {
        this.dragging = false;
        if (this.dragSnap) save();
        return;
      }
      if (this.path && this.path.length > 3) {
        const page = currentPage();
        state.selectedIds.clear();
        for (const el of page.elements) {
          if (el.type === 'stroke') {
            for (const p of el.points) {
              if (pointInPolygon(p, this.path)) { state.selectedIds.add(el.id); break; }
            }
          } else {
            const bbox = getBBox(el);
            if (!bbox) continue;
            const center = { x: bbox.x + bbox.w/2, y: bbox.y + bbox.h/2 };
            if (pointInPolygon(center, this.path)) state.selectedIds.add(el.id);
          }
        }
        renderInspector();
      }
      this.path = null;
      overlayCtx.clearRect(0, 0, overlayCanvas.clientWidth, overlayCanvas.clientHeight);
      render();
    },
  },

  shape: {
    down(e) {
      const pos = getPointerPos(e);
      const s = state.toolSettings.shape;
      activeDraw = {
        id: uid(), type: 'shape',
        variant: s.variant,
        color: s.color, width: s.width,
        x: pos.x, y: pos.y, w: 0, h: 0,
      };
    },
    move(e) {
      if (!activeDraw) return;
      const pos = getPointerPos(e);
      activeDraw.w = pos.x - activeDraw.x;
      activeDraw.h = pos.y - activeDraw.y;
      render();
      drawShape(activeDraw);
    },
    up() {
      if (!activeDraw) return;
      if (Math.abs(activeDraw.w) > 3 || Math.abs(activeDraw.h) > 3) {
        snapshot();
        currentPage().elements.push(activeDraw);
        save();
      }
      activeDraw = null;
      render();
    },
  },

  ruler: {
    start: null,
    down(e) {
      const pos = getPointerPos(e);
      const s = state.toolSettings.pen;
      this.start = pos;
      activeDraw = {
        id: uid(), type: 'stroke', tool: 'pen',
        color: s.color, width: s.width,
        points: [{ x: pos.x, y: pos.y, p: 0.7 }, { x: pos.x, y: pos.y, p: 0.7 }],
      };
    },
    move(e) {
      if (!activeDraw) return;
      const pos = getPointerPos(e);
      activeDraw.points[1] = { x: pos.x, y: pos.y, p: 0.7 };
      render();
      drawStroke(activeDraw);
    },
    up() {
      if (!activeDraw) return;
      const a = activeDraw.points[0], b = activeDraw.points[1];
      const dx = b.x - a.x, dy = b.y - a.y;
      if (dx*dx + dy*dy > 9) {
        snapshot();
        currentPage().elements.push(activeDraw);
        save();
      }
      activeDraw = null;
      render();
    },
  },

  text: {
    down(e) {
      const pos = getPointerPos(e);
      snapshot();
      const el = {
        id: uid(), type: 'text',
        x: pos.x, y: pos.y, w: 220,
        color: '#1a1a1a',
        content: '',
      };
      currentPage().elements.push(el);
      save();
      setTool('lasso');
      // Mark this element as selected so it's editable
      state.selectedIds.clear();
      state.selectedIds.add(el.id);
      render();
      setTimeout(() => {
        const node = overlaysContainer.querySelector(`[data-id="${el.id}"]`);
        if (node) { node.focus(); placeCaretAtEnd(node); }
      }, 30);
    },
    move() {},
    up() {},
  },

  image: {
    down() {
      document.getElementById('image-input').click();
    },
    move() {},
    up() {},
  },

  table: {
    down(e) {
      const pos = getPointerPos(e);
      snapshot();
      const el = {
        id: uid(), type: 'table',
        x: pos.x, y: pos.y, w: 280, h: 100,
        rows: 3, cols: 3,
        cells: [['', '', ''], ['', '', ''], ['', '', '']],
      };
      currentPage().elements.push(el);
      render();
      save();
      setTool('lasso');
    },
    move() {},
    up() {},
  },
};

function placeCaretAtEnd(el) {
  el.focus();
  if (typeof window.getSelection !== "undefined" && typeof document.createRange !== "undefined") {
    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }
}

function translateEl(el, dx, dy) {
  if (el.type === 'stroke') {
    for (const p of el.points) { p.x += dx; p.y += dy; }
  } else {
    el.x += dx; el.y += dy;
  }
}

// ====== Sidebar UI ======
const folderList = document.getElementById('folder-list');
function renderSidebar() {
  folderList.innerHTML = '';
  for (const folder of state.folders) {
    const fEl = document.createElement('div');
    fEl.className = 'folder' + (folder.expanded ? '' : ' collapsed');

    const header = document.createElement('div');
    header.className = 'folder-header';
    header.innerHTML = `
      <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      <span class="folder-name" contenteditable="true">${esc(folder.name)}</span>
      <span class="folder-actions">
        <button class="icon-btn" data-act="del" title="Delete folder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
      </span>
    `;
    header.querySelector('.chevron').addEventListener('click', (e) => {
      e.stopPropagation();
      folder.expanded = !folder.expanded;
      renderSidebar(); save();
    });
    header.querySelector('.folder-name').addEventListener('blur', (ev) => {
      folder.name = ev.target.textContent.trim() || 'Untitled folder';
      save();
    });
    header.querySelector('.folder-name').addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter') { ev.preventDefault(); ev.target.blur(); }
    });
    header.querySelector('[data-act="del"]').addEventListener('click', (ev) => {
      ev.stopPropagation();
      if (!confirm('Delete folder "' + folder.name + '" and all its notes?')) return;
      snapshot();
      for (const nid of folder.noteIds) {
        const note = state.notes[nid];
        if (note) {
          for (const pid of note.pageIds) delete state.pages[pid];
          delete state.notes[nid];
        }
      }
      state.folders = state.folders.filter(f => f.id !== folder.id);
      if (state.folders.length === 0) seed();
      const fb = state.folders[0];
      if (fb && fb.noteIds[0]) {
        state.currentNoteId = fb.noteIds[0];
        state.currentPageId = state.notes[state.currentNoteId].pageIds[0];
      }
      renderSidebar(); renderPageTabs(); render(); save();
    });
    fEl.appendChild(header);

    const noteList = document.createElement('div');
    noteList.className = 'note-list';
    for (const noteId of folder.noteIds) {
      const note = state.notes[noteId];
      if (!note) continue;
      const item = document.createElement('div');
      item.className = 'note-item' + (state.currentNoteId === noteId ? ' active' : '');
      item.innerHTML = `
        <svg class="note-icon" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span class="note-title" contenteditable="true">${esc(note.title || 'Untitled')}</span>
      `;
      item.addEventListener('click', () => openNote(noteId));
      const ti = item.querySelector('.note-title');
      ti.addEventListener('click', (ev) => ev.stopPropagation());
      ti.addEventListener('blur', (ev) => {
        note.title = ev.target.textContent.trim() || 'Untitled';
        document.getElementById('note-title-input').value = note.title;
        save();
      });
      ti.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter') { ev.preventDefault(); ev.target.blur(); }
      });
      noteList.appendChild(item);
    }
    const addBtn = document.createElement('button');
    addBtn.className = 'add-note-btn';
    addBtn.textContent = '+ New note';
    addBtn.addEventListener('click', () => addNote(folder.id));
    noteList.appendChild(addBtn);
    fEl.appendChild(noteList);
    folderList.appendChild(fEl);
  }
  const addFB = document.createElement('button');
  addFB.className = 'add-folder-btn';
  addFB.textContent = '+ New folder';
  addFB.addEventListener('click', addFolder);
  folderList.appendChild(addFB);
}

function openNote(noteId) {
  // Cancel any active draw
  activeDraw = null; isPointerDown = false;
  state.currentNoteId = noteId;
  const note = state.notes[noteId];
  if (note && note.pageIds.length > 0) state.currentPageId = note.pageIds[0];
  state.selectedIds.clear();
  document.getElementById('note-title-input').value = note.title || '';
  renderSidebar();
  renderPageTabs();
  render();
  save();
}
function addFolder() {
  snapshot();
  state.folders.push({ id: uid(), name: 'New Folder', expanded: true, noteIds: [] });
  renderSidebar(); save();
}
function addNote(folderId) {
  snapshot();
  const noteId = uid();
  const pageId = uid();
  state.notes[noteId] = { id: noteId, title: 'Untitled', folderId, pageIds: [pageId] };
  state.pages[pageId] = { id: pageId, elements: [] };
  const folder = state.folders.find(f => f.id === folderId);
  folder.noteIds.push(noteId);
  folder.expanded = true;
  openNote(noteId);
}

// ====== Page tabs ======
const pageTabsEl = document.getElementById('page-tabs');
function renderPageTabs() {
  pageTabsEl.innerHTML = '';
  const note = state.notes[state.currentNoteId];
  if (!note) return;
  note.pageIds.forEach((pageId, i) => {
    const tab = document.createElement('button');
    tab.className = 'page-tab' + (pageId === state.currentPageId ? ' active' : '');
    tab.textContent = 'Page ' + (i + 1);
    tab.addEventListener('click', () => {
      activeDraw = null; isPointerDown = false;
      state.currentPageId = pageId;
      state.selectedIds.clear();
      renderPageTabs(); render(); save();
    });
    pageTabsEl.appendChild(tab);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'add-page-btn';
  addBtn.textContent = '+';
  addBtn.title = 'Add page';
  addBtn.addEventListener('click', () => {
    snapshot();
    const pageId = uid();
    state.pages[pageId] = { id: pageId, elements: [] };
    note.pageIds.push(pageId);
    state.currentPageId = pageId;
    state.selectedIds.clear();
    renderPageTabs(); render(); save();
  });
  pageTabsEl.appendChild(addBtn);
}

// ====== Toolbar ======
const toolGroup = document.getElementById('tool-group');
function renderToolbar() {
  toolGroup.innerHTML = '';
  for (const t of TOOLS) {
    const btn = document.createElement('button');
    btn.className = 'tool' + (state.currentTool === t.id ? ' active' : '');
    btn.title = t.label;
    btn.innerHTML = t.icon;
    btn.addEventListener('click', () => setTool(t.id));
    toolGroup.appendChild(btn);
  }
}
function setTool(toolId) {
  activeDraw = null; isPointerDown = false;
  state.currentTool = toolId;
  document.body.dataset.tool = toolId;
  if (toolId !== 'lasso') state.selectedIds.clear();
  renderToolbar();
  renderInspector();
  render();
  // image tool is one-shot
  if (toolId === 'image') {
    document.getElementById('image-input').click();
    state.currentTool = 'pen';
    document.body.dataset.tool = 'pen';
    renderToolbar();
    renderInspector();
  }
}

// ====== Inspector ======
const inspector = document.getElementById('inspector');
function renderInspector() {
  inspector.innerHTML = '';
  const tool = state.currentTool;
  if (tool === 'pen' || tool === 'ruler') {
    const s = state.toolSettings.pen;
    inspector.appendChild(makeColorPicker(PEN_COLORS, s.color, (c) => { s.color = c; renderInspector(); }));
    inspector.appendChild(makeWidthPicker(PEN_WIDTHS, s.width, (w) => { s.width = w; renderInspector(); }, s.color, [3,6,10]));
  } else if (tool === 'highlighter') {
    const s = state.toolSettings.highlighter;
    inspector.appendChild(makeColorPicker(HIGHLIGHTER_COLORS, s.color, (c) => { s.color = c; renderInspector(); }));
    inspector.appendChild(makeWidthPicker(HIGHLIGHTER_WIDTHS, s.width, (w) => { s.width = w; renderInspector(); }, s.color, [6,10,14]));
  } else if (tool === 'eraser') {
    const s = state.toolSettings.eraser;
    inspector.appendChild(makeWidthPicker(ERASER_WIDTHS, s.width, (w) => { s.width = w; renderInspector(); }, '#888', [6,10,14]));
  } else if (tool === 'shape') {
    const s = state.toolSettings.shape;
    const sec = document.createElement('div');
    sec.className = 'inspector-section';
    const lbl = document.createElement('span'); lbl.className = 'inspector-label'; lbl.textContent = 'Shape';
    const wrap = document.createElement('div'); wrap.className = 'variant-btns';
    for (const v of SHAPE_VARIANTS) {
      const b = document.createElement('button');
      b.className = 'variant-btn' + (s.variant === v.id ? ' active' : '');
      b.textContent = v.label;
      b.addEventListener('click', () => { s.variant = v.id; renderInspector(); });
      wrap.appendChild(b);
    }
    sec.appendChild(lbl); sec.appendChild(wrap);
    inspector.appendChild(sec);
    inspector.appendChild(makeColorPicker(PEN_COLORS, s.color, (c) => { s.color = c; renderInspector(); }));
    inspector.appendChild(makeWidthPicker([1.5, 2.5, 4], s.width, (w) => { s.width = w; renderInspector(); }, s.color, [3,6,10]));
  } else if (tool === 'lasso') {
    const hint = document.createElement('div');
    hint.className = 'hint';
    hint.innerHTML = 'Draw around items to select them. Drag selection to move. Tap an item to edit text/tables.';
    inspector.appendChild(hint);
    if (state.selectedIds.size > 0) {
      const btn = document.createElement('button');
      btn.className = 'danger-btn';
      btn.textContent = `Delete ${state.selectedIds.size} item${state.selectedIds.size===1?'':'s'}`;
      btn.addEventListener('click', () => {
        snapshot();
        const page = currentPage();
        page.elements = page.elements.filter(el => !state.selectedIds.has(el.id));
        state.selectedIds.clear();
        render(); save(); renderInspector();
      });
      inspector.appendChild(btn);
    }
  } else if (tool === 'text') {
    const hint = document.createElement('div');
    hint.className = 'hint';
    hint.textContent = 'Tap on the canvas to add a text block.';
    inspector.appendChild(hint);
  } else if (tool === 'table') {
    const hint = document.createElement('div');
    hint.className = 'hint';
    hint.textContent = 'Tap on the canvas to insert a 3×3 table.';
    inspector.appendChild(hint);
  } else {
    inspector.classList.add('hidden');
    return;
  }
  inspector.classList.remove('hidden');
}

function makeColorPicker(colors, active, onSelect) {
  const sec = document.createElement('div');
  sec.className = 'inspector-section';
  const lbl = document.createElement('span'); lbl.className = 'inspector-label'; lbl.textContent = 'Color';
  const wrap = document.createElement('div'); wrap.className = 'color-swatches';
  for (const c of colors) {
    const sw = document.createElement('button');
    sw.className = 'color-swatch' + (c === active ? ' active' : '');
    sw.style.background = c;
    sw.addEventListener('click', () => onSelect(c));
    wrap.appendChild(sw);
  }
  sec.appendChild(lbl); sec.appendChild(wrap);
  return sec;
}
function makeWidthPicker(widths, active, onSelect, color, displaySizes) {
  const sec = document.createElement('div');
  sec.className = 'inspector-section';
  const lbl = document.createElement('span'); lbl.className = 'inspector-label'; lbl.textContent = 'Size';
  const wrap = document.createElement('div'); wrap.className = 'width-options';
  widths.forEach((w, i) => {
    const b = document.createElement('button');
    b.className = 'width-option' + (w === active ? ' active' : '');
    const dot = document.createElement('span');
    dot.className = 'dot';
    const size = (displaySizes && displaySizes[i]) || Math.min(w, 14);
    dot.style.width = size + 'px';
    dot.style.height = size + 'px';
    dot.style.background = color;
    b.appendChild(dot);
    b.addEventListener('click', () => onSelect(w));
    wrap.appendChild(b);
  });
  sec.appendChild(lbl); sec.appendChild(wrap);
  return sec;
}

// ====== Image upload + paste ======
function ingestImage(dataUrl) {
  const img = new Image();
  img.onload = () => {
    snapshot();
    const maxW = 360, maxH = 360;
    let w = img.width, h = img.height;
    if (w > maxW) { h = h * (maxW/w); w = maxW; }
    if (h > maxH) { w = w * (maxH/h); h = maxH; }
    currentPage().elements.push({
      id: uid(), type: 'image',
      x: 80, y: 80, w, h, src: dataUrl,
    });
    render(); save();
  };
  img.src = dataUrl;
}
document.getElementById('image-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = (ev) => ingestImage(ev.target.result);
  r.readAsDataURL(file);
  e.target.value = '';
});
window.addEventListener('paste', (e) => {
  const items = e.clipboardData ? e.clipboardData.items : [];
  for (const it of items) {
    if (it.type && it.type.startsWith('image/')) {
      const f = it.getAsFile();
      const r = new FileReader();
      r.onload = (ev) => ingestImage(ev.target.result);
      r.readAsDataURL(f);
      e.preventDefault();
      return;
    }
  }
});

// ====== Keyboard ======
window.addEventListener('keydown', (e) => {
  if (e.target.isContentEditable || e.target.tagName === 'INPUT') return;
  if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
  if ((e.metaKey || e.ctrlKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); return; }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (state.selectedIds.size > 0) {
      e.preventDefault();
      snapshot();
      const page = currentPage();
      page.elements = page.elements.filter(el => !state.selectedIds.has(el.id));
      state.selectedIds.clear();
      render(); save(); renderInspector();
      return;
    }
  }
  if (e.key === 'p') setTool('pen');
  else if (e.key === 'h') setTool('highlighter');
  else if (e.key === 'e') setTool('eraser');
  else if (e.key === 'l') setTool('lasso');
  else if (e.key === 's') setTool('shape');
  else if (e.key === 'r') setTool('ruler');
  else if (e.key === 't') setTool('text');
});

// ====== Status flash ======
const statusEl = document.getElementById('status');
let statusTimer = null;
function flashStatus(text) {
  statusEl.textContent = text;
  statusEl.classList.add('show');
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => statusEl.classList.remove('show'), 1100);
}

// ====== Wiring ======
document.getElementById('sidebar-toggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('collapsed');
  setTimeout(resize, 260);
});
document.getElementById('new-folder-btn').addEventListener('click', addFolder);
document.getElementById('note-title-input').addEventListener('input', (e) => {
  if (state.currentNoteId) {
    state.notes[state.currentNoteId].title = e.target.value || 'Untitled';
    renderSidebar(); save();
  }
});
document.getElementById('undo-btn').addEventListener('click', undo);
document.getElementById('redo-btn').addEventListener('click', redo);

// Prevent native gestures on canvas area
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('touchmove', e => {
  if (e.target.closest('#canvas-container')) e.preventDefault();
}, { passive: false });
window.addEventListener('contextmenu', e => {
  if (e.target.closest('#canvas-container')) e.preventDefault();
});

// ====== Init ======
if (!load()) seed();
if (!state.currentNoteId || !state.notes[state.currentNoteId]) {
  if (state.folders.length === 0 || state.folders[0].noteIds.length === 0) seed();
  state.currentNoteId = state.folders[0].noteIds[0];
  state.currentPageId = state.notes[state.currentNoteId].pageIds[0];
}
document.getElementById('note-title-input').value = state.notes[state.currentNoteId].title || '';
document.body.dataset.tool = state.currentTool;
renderSidebar();
renderPageTabs();
renderToolbar();
renderInspector();
window.addEventListener('resize', resize);
setTimeout(resize, 50);
</script>
