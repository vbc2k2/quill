<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Quill v2 — Notes Prototype</title>
<style>
:root {
  --bg: #f5f3ee;
  --canvas: #fdfcf7;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.08);
  --text: #1a1a1a;
  --text-muted: #6b6b6b;
  --text-faint: #999;
  --accent: #5b8c5a;
  --accent-light: rgba(91,140,90,0.13);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 10px rgba(0,0,0,0.08);
  --shadow-lg: 0 6px 24px rgba(0,0,0,0.12);
  --radius: 10px;
  --radius-sm: 6px;
}
html.dark {
  --bg: #161616;
  --canvas: #1d1d1d;
  --surface: #232323;
  --border: rgba(255,255,255,0.08);
  --text: #ececec;
  --text-muted: #a3a3a3;
  --text-faint: #6b6b6b;
  --accent: #7eb47c;
  --accent-light: rgba(126,180,124,0.14);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
  --shadow-md: 0 2px 10px rgba(0,0,0,0.5);
  --shadow-lg: 0 6px 24px rgba(0,0,0,0.6);
}
html.dark .sun-icon { display: none; }
html:not(.dark) .moon-icon { display: none; }
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
  color: var(--text);
  overscroll-behavior: none;
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  font-size: 14px;
}
button { font-family: inherit; cursor: pointer; }
input { font-family: inherit; }

#app {
  display: grid;
  grid-template-columns: auto 1fr;
  height: 100vh;
  width: 100vw;
}

#sidebar {
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: width 0.25s ease;
}
#sidebar.collapsed { width: 0; overflow: hidden; }
.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
.icon-btn {
  background: transparent;
  border: none;
  color: var(--text-muted);
  width: 28px; height: 28px;
  border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.icon-btn:hover, .icon-btn:active { background: rgba(0,0,0,0.05); color: var(--text); }
.icon-btn svg { width: 16px; height: 16px; }
#folder-list { flex: 1; overflow-y: auto; padding: 8px; }
.folder { margin-bottom: 4px; }
.folder-header {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 8px;
  border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
}
.folder-header:hover { background: rgba(0,0,0,0.04); }
.folder-header .chevron {
  transition: transform 0.15s;
  color: var(--text-faint);
  cursor: pointer;
  width: 14px; height: 14px; flex-shrink: 0;
}
.folder.collapsed .chevron { transform: rotate(-90deg); }
.folder.collapsed .note-list { display: none; }
.folder-name { flex: 1; outline: none; cursor: text; }
.folder-actions { opacity: 0; transition: opacity 0.15s; }
.folder-header:hover .folder-actions { opacity: 1; }
.note-list { padding: 2px 0 4px 14px; }
.note-item {
  padding: 6px 8px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
}
.note-item:hover { background: rgba(0,0,0,0.04); color: var(--text); }
.note-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
.note-item .note-icon { flex-shrink: 0; opacity: 0.5; }
.note-item.active .note-icon { opacity: 1; }
.note-item .note-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; outline: none; cursor: text; }
.note-item .note-actions { opacity: 0; transition: opacity 0.15s; }
.note-item:hover .note-actions { opacity: 1; }
.add-note-btn, .add-folder-btn {
  display: block;
  padding: 5px 10px;
  font-size: 12px;
  color: var(--text-faint);
  background: transparent;
  border: none;
  text-align: left;
  margin-left: 14px;
  border-radius: var(--radius-sm);
  width: calc(100% - 14px);
}
.add-folder-btn { margin-left: 0; margin-top: 10px; width: 100%; }
.add-note-btn:hover, .add-folder-btn:hover { background: rgba(0,0,0,0.04); color: var(--text); }

#main { display: flex; flex-direction: column; overflow: hidden; position: relative; }
#topbar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  z-index: 10; flex-shrink: 0;
}
#note-title-input {
  flex: 0 1 220px;
  padding: 4px 8px;
  font-size: 15px; font-weight: 600;
  border: none; background: transparent; outline: none;
  color: var(--text);
}
#note-title-input::placeholder { color: var(--text-faint); font-weight: 500; }
.spacer { flex: 1; }

.tool-group {
  display: flex; gap: 2px;
  padding: 3px;
  background: rgba(0,0,0,0.04);
  border-radius: 9px;
}
.tool {
  background: transparent;
  border: none;
  padding: 6px;
  border-radius: 6px;
  color: var(--text-muted);
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.tool:hover { background: rgba(0,0,0,0.04); color: var(--text); }
.tool.active { background: var(--surface); color: var(--accent); box-shadow: var(--shadow-sm); }
.tool svg { width: 16px; height: 16px; }

#inspector {
  position: absolute;
  top: 64px; right: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  box-shadow: var(--shadow-md);
  z-index: 9;
  display: flex; flex-direction: column;
  gap: 12px;
  min-width: 240px; max-width: 300px;
}
#inspector.hidden { display: none; }
.inspector-section { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.inspector-label {
  font-size: 10px;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
  min-width: 50px;
}
.color-swatches { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; align-items: center; }
.color-swatch {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  padding: 0;
  background-clip: padding-box;
  position: relative;
}
.color-swatch.active { border-color: rgba(0,0,0,0.3); transform: scale(1.06); }
.color-swatch.custom {
  background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
  position: relative;
  display: inline-block;
}
.color-swatch.custom input[type=color] {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  opacity: 0; cursor: pointer; padding: 0; border: none;
}
.size-slider-wrap { display: flex; gap: 10px; align-items: center; flex: 1; }
.size-slider {
  flex: 1;
  -webkit-appearance: none; appearance: none;
  height: 4px;
  background: rgba(0,0,0,0.08);
  border-radius: 2px;
  outline: none;
}
.size-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 18px; height: 18px;
  background: var(--accent);
  border: 2px solid var(--surface);
  border-radius: 50%;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
}
.size-slider::-moz-range-thumb {
  width: 18px; height: 18px;
  background: var(--accent);
  border: 2px solid var(--surface);
  border-radius: 50%;
  cursor: pointer;
}
.size-value {
  font-size: 11px;
  color: var(--text-muted);
  font-family: ui-monospace, monospace;
  min-width: 28px;
  text-align: right;
}
.size-preview {
  width: 32px; height: 32px;
  border: 1px solid var(--border);
  border-radius: 7px;
  display: inline-flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.02);
}
.size-preview .dot { background: var(--text); border-radius: 50%; }
.variant-btns { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
.variant-btn {
  background: transparent;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  padding: 6px 10px;
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
  min-width: 50px;
}
.variant-btn.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.danger-btn {
  background: #fef1f1;
  color: #c1373d;
  border: 1px solid #f5c1c4;
  padding: 7px 12px;
  border-radius: 7px;
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  width: 100%;
}
.hint {
  font-size: 11.5px;
  color: var(--text-muted);
  line-height: 1.5;
}

#page-tabs {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  flex-shrink: 0;
}
.page-tab {
  padding: 4px 12px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 6px;
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.page-tab.active {
  background: var(--surface);
  color: var(--text);
  border-color: var(--border);
  box-shadow: var(--shadow-sm);
}
.page-tab .close-btn {
  opacity: 0;
  background: transparent;
  border: none;
  width: 14px; height: 14px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-faint);
  border-radius: 3px;
  padding: 0;
}
.page-tab.active .close-btn, .page-tab:hover .close-btn { opacity: 1; }
.page-tab .close-btn:hover { background: rgba(0,0,0,0.08); color: var(--text); }
.add-page-btn {
  background: transparent;
  border: none;
  padding: 4px 8px;
  color: var(--text-faint);
  font-size: 14px;
}
#page-settings-btn {
  background: var(--accent-light);
  border: 1px solid rgba(91,140,90,0.25);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 11.5px;
  color: var(--accent);
  font-weight: 500;
  display: flex; align-items: center; gap: 5px;
  margin-right: 10px;
  flex-shrink: 0;
}
#page-settings-btn svg { width: 12px; height: 12px; }
#page-tabs-sep {
  display: inline-block;
  width: 1px;
  height: 18px;
  background: var(--border);
  margin: 0 8px 0 2px;
  flex-shrink: 0;
}

#page-settings-popover {
  position: absolute;
  top: 100px; left: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: var(--shadow-lg);
  z-index: 11;
  min-width: 240px;
  display: none;
}
#page-settings-popover.show { display: block; }
.template-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.template-option {
  padding: 8px 4px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--canvas);
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  transition: all 0.15s;
}
.template-option.active { border-color: var(--accent); }
.template-option .swatch {
  width: 50px; height: 38px;
  background: #fdfcf7;
  border-radius: 3px;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(0,0,0,0.06);
}
.template-option .name { font-size: 10.5px; color: var(--text-muted); font-weight: 500; }
.template-option.active .name { color: var(--accent); }

#canvas-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}
#canvas {
  position: absolute;
  top: 0; left: 0;
  background: var(--canvas);
  touch-action: none;
}
#overlay-canvas {
  position: absolute;
  top: 0; left: 0;
  pointer-events: none;
  touch-action: none;
}
#overlays-container {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  transform-origin: 0 0;
}
.element-overlay {
  position: absolute;
  pointer-events: none;
  box-sizing: border-box;
}
body[data-tool="lasso"] .element-overlay { pointer-events: auto; }
.text-element {
  background: rgba(255,255,255,0);
  border: 1px dashed transparent;
  padding: 6px 8px;
  font-size: 16px;
  line-height: 1.5;
  outline: none;
  min-width: 100px;
  min-height: 26px;
  cursor: text;
  color: #1a1a1a;
  font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  -webkit-user-select: text;
  user-select: text;
}
body[data-tool="lasso"] .text-element { cursor: move; }
body[data-tool="lasso"] .text-element:hover { border-color: rgba(0,0,0,0.18); }
.image-element { border-radius: 2px; }
.image-element img {
  display: block;
  width: 100%; height: 100%;
  object-fit: contain;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none;
}
.table-element {
  background: rgba(255,255,255,0.85);
  border-collapse: collapse;
}
.table-element td {
  border: 1px solid rgba(0,0,0,0.15);
  padding: 6px 10px;
  font-size: 13.5px;
  min-width: 80px;
  outline: none;
  -webkit-user-select: text;
  user-select: text;
}
body[data-tool="lasso"] .element-overlay.selected {
  outline: 2px solid var(--accent);
  outline-offset: 3px;
}
body[data-tool="hand"] #canvas { cursor: grab; }
body[data-tool="hand"] #canvas:active { cursor: grabbing; }

#zoom-controls {
  position: absolute;
  bottom: 16px; left: 16px;
  display: flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 2px;
  box-shadow: var(--shadow-sm);
  z-index: 8;
}
#zoom-controls button {
  background: transparent; border: none;
  width: 30px; height: 30px;
  color: var(--text-muted);
  border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
}
#zoom-controls button:hover { background: rgba(0,0,0,0.04); color: var(--text); }
#zoom-controls svg { width: 14px; height: 14px; }
#zoom-level {
  font-size: 11px;
  color: var(--text-muted);
  font-family: ui-monospace, monospace;
  padding: 0 8px;
  display: inline-flex; align-items: center;
  min-width: 50px;
  justify-content: center;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  margin: 0 2px;
}

#status {
  position: absolute;
  bottom: 14px; left: 50%;
  transform: translateX(-50%);
  padding: 6px 14px;
  background: rgba(26,26,26,0.85);
  color: white;
  border-radius: 16px;
  font-size: 11.5px;
  pointer-events: none;
  font-family: ui-monospace, monospace;
  opacity: 0;
  transition: opacity 0.3s;
  letter-spacing: 0.02em;
  z-index: 8;
}
#status.show { opacity: 1; }

@media (max-width: 640px) {
  #sidebar { position: absolute; z-index: 20; height: 100%; box-shadow: var(--shadow-md); }
  #inspector { right: 8px; min-width: 200px; }
}

/* Share modal */
#share-modal {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.45);
  z-index: 100;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
#share-modal.open { display: flex; }
.share-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px 28px 22px;
  box-shadow: var(--shadow-lg);
  max-width: 360px;
  width: calc(100% - 32px);
  text-align: center;
}
.share-card h2 {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}
.share-card .share-sub {
  font-size: 12.5px;
  color: var(--text-muted);
  margin-bottom: 18px;
  line-height: 1.45;
}
.share-card .qr-wrap {
  width: 220px;
  height: 220px;
  margin: 0 auto 16px;
  padding: 14px;
  background: white;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
}
.share-card .qr-wrap img,
.share-card .qr-wrap canvas {
  width: 100% !important;
  height: 100% !important;
  display: block;
}
.share-card .qr-placeholder {
  color: var(--text-faint);
  font-size: 12px;
  text-align: center;
}
.share-card .share-url {
  background: rgba(0,0,0,0.04);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  font-family: ui-monospace, monospace;
  font-size: 12px;
  color: var(--text);
  margin-bottom: 12px;
  word-break: break-all;
  text-align: center;
}
html.dark .share-card .share-url { background: rgba(255,255,255,0.04); }
.share-card .room-row {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  font-size: 12px;
}
.share-card .room-row label {
  color: var(--text-muted);
  align-self: center;
  font-family: ui-monospace, monospace;
  font-size: 11px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.share-card .room-row input {
  flex: 1;
  background: rgba(0,0,0,0.04);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 9px;
  font-family: ui-monospace, monospace;
  font-size: 12px;
  color: var(--text);
  outline: none;
}
html.dark .share-card .room-row input { background: rgba(255,255,255,0.04); }
.share-card .share-actions {
  display: flex;
  gap: 8px;
  justify-content: center;
}
.share-card button {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 16px;
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
}
.share-card button.primary {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}
.share-card button:hover { background: rgba(0,0,0,0.04); }
html.dark .share-card button:hover { background: rgba(255,255,255,0.06); }
.share-card button.primary:hover { background: #4a7649; }
.share-card .copied-toast {
  font-size: 11.5px;
  color: var(--accent);
  margin-top: 8px;
  min-height: 14px;
}

/* Checkbox element */
.checkbox-element {
  background: transparent;
  border: 1px dashed transparent;
  padding: 4px 8px;
  font-size: 15px;
  color: var(--text);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border-radius: 6px;
  cursor: default;
  min-height: 28px;
}
body[data-tool="lasso"] .checkbox-element:hover { border-color: rgba(0,0,0,0.18); }
html.dark body[data-tool="lasso"] .checkbox-element:hover { border-color: rgba(255,255,255,0.2); }
.checkbox-element .cb-box {
  width: 18px; height: 18px;
  border: 1.8px solid var(--text-muted);
  border-radius: 4px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--surface);
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.12s, border-color 0.12s;
  pointer-events: auto;
}
.checkbox-element .cb-box:hover { border-color: var(--accent); }
.checkbox-element.checked .cb-box {
  background: var(--accent);
  border-color: var(--accent);
}
.checkbox-element .cb-box svg { width: 12px; height: 12px; color: white; opacity: 0; transition: opacity 0.12s; }
.checkbox-element.checked .cb-box svg { opacity: 1; }
.checkbox-element .cb-label {
  flex: 1;
  outline: none;
  min-width: 80px;
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  -webkit-user-select: text;
  user-select: text;
}
.checkbox-element.checked .cb-label {
  text-decoration: line-through;
  color: var(--text-muted);
}

/* Sticky note (text element variant) */
.text-element.sticky {
  border-radius: 6px;
  padding: 10px 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
  border: none;
  min-width: 140px;
  font-size: 14px;
  line-height: 1.4;
}
html.dark .text-element.sticky { box-shadow: 0 2px 8px rgba(0,0,0,0.5); }

/* Pen presets row in inspector */
.pen-presets {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.pen-preset {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px 3px 4px;
  background: rgba(0,0,0,0.04);
  border: 1px solid var(--border);
  border-radius: 16px;
  font-size: 11px;
  cursor: pointer;
  color: var(--text);
}
.pen-preset:hover { background: rgba(0,0,0,0.07); }
html.dark .pen-preset { background: rgba(255,255,255,0.04); }
html.dark .pen-preset:hover { background: rgba(255,255,255,0.08); }
.pen-preset .swatch {
  width: 14px; height: 14px;
  border-radius: 50%;
  display: inline-block;
  border: 1px solid rgba(0,0,0,0.1);
}
.pen-preset .del-x {
  margin-left: 2px;
  opacity: 0;
  color: var(--text-faint);
  cursor: pointer;
  font-size: 13px;
  line-height: 1;
}
.pen-preset:hover .del-x { opacity: 0.7; }
.pen-preset .del-x:hover { opacity: 1; color: #c1373d; }
.preset-save-btn {
  background: var(--accent-light);
  color: var(--accent);
  border: 1px solid rgba(91,140,90,0.25);
  border-radius: 14px;
  padding: 3px 10px;
  font-size: 11px;
  cursor: pointer;
  font-weight: 500;
}

/* Stamp icon picker grid */
.stamp-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 4px;
  flex: 1;
}
.stamp-grid button {
  background: transparent;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 6px 0;
  font-size: 18px;
  cursor: pointer;
  line-height: 1;
}
.stamp-grid button.active {
  border-color: var(--accent);
  background: var(--accent-light);
}

/* Print mode — hide UI, show only the canvas */
@media print {
  @page { margin: 12mm; }
  html, body { background: white !important; height: auto !important; overflow: visible !important; }
  #sidebar, #topbar, #sync-bar, #page-tabs, #page-settings-popover, #zoom-controls, #inspector, #status, #share-modal {
    display: none !important;
  }
  #app, #main, #canvas-container { display: block !important; height: auto !important; }
  #canvas-container { position: static !important; overflow: visible !important; }
  #canvas { position: static !important; width: 100% !important; height: auto !important; max-height: 100vh; }
  #overlay-canvas { display: none !important; }
}

/* Sync bar (added) */
#sync-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  font-size: 12px;
  color: var(--text-muted);
  flex-wrap: wrap;
}
#sync-bar .sync-label {
  font-family: ui-monospace, monospace;
  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-faint);
  font-weight: 600;
}
#sync-bar input {
  background: rgba(0,0,0,0.04);
  border: 1px solid transparent;
  border-radius: 5px;
  padding: 4px 8px;
  font-size: 12px;
  font-family: ui-monospace, monospace;
  outline: none;
  width: 130px;
  color: var(--text);
}
#sync-bar input:focus { border-color: var(--accent); background: white; }
#sync-bar button {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 5px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
}
#sync-bar button:hover { background: #4a7649; }
#sync-bar button:disabled { background: rgba(0,0,0,0.1); color: var(--text-faint); cursor: not-allowed; }
#sync-bar .sync-status {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  background: rgba(0,0,0,0.03);
  border-radius: 10px;
  font-size: 11.5px;
}
#sync-bar .indicator {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text-faint);
}
#sync-bar .indicator.connecting { background: #d97706; animation: sync-pulse 1s infinite; }
#sync-bar .indicator.connected { background: var(--accent); }
#sync-bar .indicator.disconnected { background: #c1373d; }
@keyframes sync-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
#sync-bar .sync-peers {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  background: rgba(91,140,90,0.08);
  border-radius: 10px;
  font-variant-numeric: tabular-nums;
  font-size: 11.5px;
}
#sync-bar #sync-peers-count { color: var(--accent); font-weight: 600; }
#sync-bar .sync-counters {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 3px 10px;
  background: rgba(0,0,0,0.03);
  border-radius: 10px;
  font-family: ui-monospace, monospace;
  font-size: 11px;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}
#sync-bar .sync-counters .up { color: var(--accent); }
#sync-bar .sync-counters .down { color: #1e6fea; }
#sync-bar #sync-force-push {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
  font-size: 13px;
  padding: 3px 8px;
  margin-left: -2px;
}
#sync-bar #sync-force-push:hover:not(:disabled) { background: var(--accent-light); color: var(--accent); }
#sync-bar .sync-help { color: var(--text-faint); font-size: 11px; margin-left: auto; }
</style>
</head>

const PAGE_TEMPLATES = [
  { id: 'blank',     label: 'Blank' },
  { id: 'lined',     label: 'Lined' },
  { id: 'wideline',  label: 'Wide' },
  { id: 'grid',      label: 'Grid' },

  { id: 'music',     label: 'Music' },
  { id: 'isometric', label: 'Isometric' },
];

// ============================================================
// State
// ============================================================
const state = {
  folders: [],
  notes: {},
  pages: {},
  currentNoteId: null,
  currentPageId: null,
  currentTool: 'pen',
  toolSettings: {
    pen:         { color: '#111111', width: 2.5 },
    highlighter: { color: '#fef08a', width: 18 },
    eraser:      { width: 14 },
    shape:       { variant: 'rect', color: '#111111', width: 2.5 },
    sticky:      { color: '#fef08a' },
    stamp:       { icon: '⭐', size: 36 },
  },
  customColors: { pen: '#111111', highlighter: '#fef08a', shape: '#111111' },
  penPresets: [],
  selectedIds: new Set(),
  history: [],
  redoStack: [],
  view: { x: 0, y: 0, scale: 1 },
};

const uid = () => Math.random().toString(36).slice(2, 11);
const esc = (s) => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

// ============================================================
// Persistence
// ============================================================
const STORAGE_KEY = 'quill-state-v2';
let saveTimer = null;
function snapshotState() {
  return {
    folders: state.folders, notes: state.notes, pages: state.pages,
    currentNoteId: state.currentNoteId, currentPageId: state.currentPageId,
    customColors: state.customColors,
    penPresets: state.penPresets,
  };
}
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const data = snapshotState();
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      flashStatus('Saved');
    } catch (e) { flashStatus('Save failed: ' + e.message); }
    // Also push to sync if connected (defined below — see Sync section)
    if (typeof pushToSync === 'function') pushToSync(data);
  }, 400);
}
// Immediate write — skips the 400ms debounce. Used on stroke commit so the
// persistent state reaches peers BEFORE we clear our awareness liveStroke,
// avoiding a visible gap where the stroke briefly disappears on the peer.
function saveNow() {
  clearTimeout(saveTimer); saveTimer = null;
  const data = snapshotState();
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) { flashStatus('Save failed: ' + e.message); }
  if (typeof pushToSync === 'function') pushToSync(data);
}
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const p = JSON.parse(raw);
    state.folders = p.folders || [];
    state.notes = p.notes || {};
    state.pages = p.pages || {};
    state.currentNoteId = p.currentNoteId;
    state.currentPageId = p.currentPageId;
    if (p.customColors) state.customColors = { ...state.customColors, ...p.customColors };
    if (Array.isArray(p.penPresets)) state.penPresets = p.penPresets;
    // Migrate: ensure each page has template
    for (const pid in state.pages) {
      if (!state.pages[pid].template) state.pages[pid].template = 'lined';
    }
    return true;
  } catch (e) { return false; }
}
function seed() {
  const fid = uid(), nid = uid(), pid = uid();
  state.folders = [{ id: fid, name: 'My Notebook', expanded: true, noteIds: [nid] }];
  state.notes[nid] = { id: nid, title: 'Welcome', folderId: fid, pageIds: [pid] };
  state.pages[pid] = { id: pid, template: 'lined', elements: [] };
  state.currentNoteId = nid;
  state.currentPageId = pid;
}

// ============================================================
// Canvas
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
const overlayCanvas = document.getElementById('overlay-canvas');
const overlayCtx = overlayCanvas.getContext('2d', { alpha: true });
const overlaysContainer = document.getElementById('overlays-container');

let dpr = 1;
function resize() {
  dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  for (const c of [canvas, overlayCanvas]) {
    c.width = Math.round(rect.width * dpr);
    c.height = Math.round(rect.height * dpr);
    c.style.width = rect.width + 'px';
    c.style.height = rect.height + 'px';
  }
  render();
}

function applyMainTransform() {
  ctx.setTransform(state.view.scale * dpr, 0, 0, state.view.scale * dpr,
                   state.view.x * dpr, state.view.y * dpr);
}
function applyOverlayTransform() {
  overlayCtx.setTransform(state.view.scale * dpr, 0, 0, state.view.scale * dpr,
                          state.view.x * dpr, state.view.y * dpr);
}
function updateOverlaysTransform() {
  overlaysContainer.style.transform =
    `translate(${state.view.x}px, ${state.view.y}px) scale(${state.view.scale})`;
}
function screenToWorld(sx, sy) {
  return { x: (sx - state.view.x) / state.view.scale, y: (sy - state.view.y) / state.view.scale };
}
function getCanvasPoint(e) {
  const rect = canvas.getBoundingClientRect();
  return screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
}

// ============================================================
// Smooth stroke outline (perfect-freehand style)
// ============================================================
function getStrokeOutline(points, size, thinning, pressureMin) {
  if (!points || points.length === 0) return [];
  // Streamline: low-pass filter for jitter reduction.
  // Last point stays at actual pen position so there's no lag at the tip.
  const streamline = 0.4;
  const smoothed = [];
  for (let i = 0; i < points.length; i++) {
    if (i === 0) { smoothed.push({ x: points[i].x, y: points[i].y, p: points[i].p || 0.5 }); continue; }
    if (i === points.length - 1) {
      smoothed.push({ x: points[i].x, y: points[i].y, p: points[i].p || 0.5 });
      continue;
    }
    const prev = smoothed[i-1], curr = points[i];
    const t = 1 - streamline;
    smoothed.push({
      x: prev.x + (curr.x - prev.x) * t,
      y: prev.y + (curr.y - prev.y) * t,
      p: prev.p + ((curr.p || 0.5) - prev.p) * t,
    });
  }
  // Dot for single point
  if (smoothed.length < 2) {
    const p = smoothed[0];
    const r = size * 0.5 * (pressureMin + (1 - pressureMin) * (p.p || 0.5));
    const out = [];
    for (let i = 0; i < 20; i++) {
      const a = (i / 20) * Math.PI * 2;
      out.push([p.x + Math.cos(a) * r, p.y + Math.sin(a) * r]);
    }
    return out;
  }
  // Build left + right offset paths
  const left = [], right = [];
  for (let i = 0; i < smoothed.length; i++) {
    const p = smoothed[i];
    let dx, dy;
    if (i === 0) {
      dx = smoothed[1].x - p.x;
      dy = smoothed[1].y - p.y;
    } else if (i === smoothed.length - 1) {
      dx = p.x - smoothed[i-1].x;
      dy = p.y - smoothed[i-1].y;
    } else {
      const a = smoothed[i-1], b = smoothed[i+1];
      const dx1 = p.x - a.x, dy1 = p.y - a.y;
      const dx2 = b.x - p.x, dy2 = b.y - p.y;
      const l1 = Math.hypot(dx1, dy1) || 1;
      const l2 = Math.hypot(dx2, dy2) || 1;
      dx = (dx1 / l1 + dx2 / l2) / 2;
      dy = (dy1 / l1 + dy2 / l2) / 2;
    }
    const len = Math.hypot(dx, dy) || 1;
    const nx = -dy / len, ny = dx / len;
    const pressure = p.p || 0.5;
    const halfW = size * 0.5 * (pressureMin + (1 - pressureMin) * pressure);
    left.push([p.x + nx * halfW, p.y + ny * halfW]);
    right.push([p.x - nx * halfW, p.y - ny * halfW]);
  }
  // Round caps: add semicircle at both ends
  const startPt = smoothed[0], endPt = smoothed[smoothed.length-1];
  const startW = size * 0.5 * (pressureMin + (1 - pressureMin) * (startPt.p || 0.5));
  const endW = size * 0.5 * (pressureMin + (1 - pressureMin) * (endPt.p || 0.5));
  // Cap start (between left[0] and right[0])
  const startCap = [];
  const startAngle = Math.atan2(left[0][1] - startPt.y, left[0][0] - startPt.x);
  for (let i = 1; i < 8; i++) {
    const a = startAngle + (i / 8) * Math.PI;
    startCap.push([startPt.x + Math.cos(a) * startW, startPt.y + Math.sin(a) * startW]);
  }
  // Cap end (between right[last] and left[last])
  const endCap = [];
  const li = left.length - 1;
  const endAngle = Math.atan2(right[li][1] - endPt.y, right[li][0] - endPt.x);
  for (let i = 1; i < 8; i++) {
    const a = endAngle + (i / 8) * Math.PI;
    endCap.push([endPt.x + Math.cos(a) * endW, endPt.y + Math.sin(a) * endW]);
  }
  return [...left, ...endCap, ...right.reverse(), ...startCap];
}

// ============================================================
// Rendering
// ============================================================
function currentPage() { return state.pages[state.currentPageId]; }

function clearCanvas(c, targetCanvas) {
  c.save();
  c.setTransform(1, 0, 0, 1, 0, 0);
  c.clearRect(0, 0, targetCanvas.width, targetCanvas.height);
  c.restore();
}

function isDarkMode() {
  return document.documentElement.classList.contains('dark');
}
function themeColors() {
  const dark = isDarkMode();
  return {
    canvasBg:    dark ? '#1d1d1d' : '#fdfcf7',
    paperStroke: dark ? 'rgba(120,125,135,0.20)' : 'rgba(180,170,150,0.22)',
    paperDot:    dark ? 'rgba(120,125,135,0.45)' : 'rgba(150,140,120,0.42)',
    marginLine:  dark ? 'rgba(220,120,120,0.55)' : 'rgba(220,100,100,0.55)',
  };
}

function render() {
  // Main canvas
  const w = canvas.clientWidth, h = canvas.clientHeight;
  // Clear with background
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.fillStyle = themeColors().canvasBg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  applyMainTransform();
  drawPaperLines();
  const page = currentPage();
  if (page) {
    for (const el of page.elements) {
      if (el.type === 'stroke') drawStrokeTo(ctx, el);
      else if (el.type === 'shape') drawShapeTo(ctx, el);
      else if (el.type === 'stamp') drawStampTo(ctx, el);
    }
  }
  // Render DOM overlays at appropriate scale
  renderOverlays();
  updateOverlaysTransform();
  // Clear active-stroke overlay since main reflects the truth
  clearCanvas(overlayCtx, overlayCanvas);
}

function drawPaperLines() {
  const c = ctx;
  const view = state.view;
  const wScreen = canvas.clientWidth, hScreen = canvas.clientHeight;
  // visible world bounds
  const wl = -view.x / view.scale;
  const wt = -view.y / view.scale;
  const wr = (wScreen - view.x) / view.scale;
  const wb = (hScreen - view.y) / view.scale;
  const page = currentPage();
  const template = (page && page.template) || 'lined';
  if (template === 'blank') return;

  const spacing = template === 'wideline' ? 50
                : template === 'lined' || template === 'margin' || template === 'cornell' ? 32
                : template === 'squares' ? 40
                : 24; // grid, dots, isometric, music
  const startY = Math.floor(wt / spacing) * spacing;
  const startX = Math.floor(wl / spacing) * spacing;
  const colors = themeColors();
  c.strokeStyle = colors.paperStroke;
  c.fillStyle = colors.paperDot;
  c.lineWidth = 1 / view.scale;
  if (template === 'lined' || template === 'wideline') {
    c.beginPath();
    for (let y = startY; y <= wb; y += spacing) { c.moveTo(wl, y); c.lineTo(wr, y); }
    c.stroke();
  } else if (template === 'grid' || template === 'squares') {
    c.beginPath();
    for (let y = startY; y <= wb; y += spacing) { c.moveTo(wl, y); c.lineTo(wr, y); }
    for (let x = startX; x <= wr; x += spacing) { c.moveTo(x, wt); c.lineTo(x, wb); }
    c.stroke();
  } else if (template === 'dots') {
    const r = 1.2 / view.scale;
    for (let y = startY; y <= wb; y += spacing) {
      for (let x = startX; x <= wr; x += spacing) {
        c.beginPath();
        c.arc(x, y, r, 0, Math.PI * 2);
        c.fill();
      }
    }
  } else if (template === 'margin') {
    // Lined paper with a red vertical margin line at world x=80
    c.beginPath();
    for (let y = startY; y <= wb; y += spacing) { c.moveTo(wl, y); c.lineTo(wr, y); }
    c.stroke();
    c.save();
    c.strokeStyle = colors.marginLine;
    c.lineWidth = 1.2 / view.scale;
    c.beginPath();
    c.moveTo(80, wt); c.lineTo(80, wb);
    c.stroke();
    c.restore();
  } else if (template === 'cornell') {
    // Lined paper + cue column at x=240 + summary line at world y=900
    c.beginPath();
    for (let y = startY; y <= wb; y += spacing) {
      if (y < 900) { c.moveTo(wl, y); c.lineTo(wr, y); }
    }
    c.stroke();
    c.save();
    c.strokeStyle = colors.marginLine;
    c.lineWidth = 1.2 / view.scale;
    c.beginPath();
    c.moveTo(240, wt);  c.lineTo(240, 900);
    c.moveTo(wl, 900);  c.lineTo(wr, 900);
    c.stroke();
    c.restore();
  } else if (template === 'music') {
    // Treble-clef style staff lines: groups of 5 close lines, big gap between groups
    const lineGap = 9;
    const groupHeight = lineGap * 4;
    const groupSpacing = groupHeight + 55;
    const groupStart = Math.floor(wt / groupSpacing) * groupSpacing;
    c.beginPath();
    for (let g = groupStart; g <= wb; g += groupSpacing) {
      for (let i = 0; i < 5; i++) {
        const y = g + i * lineGap;
        c.moveTo(wl, y); c.lineTo(wr, y);
      }
    }
    c.stroke();
  } else if (template === 'isometric') {
    // Triangular dot grid — easier to read at any scale than line-based iso
    const step = 28;
    const dy = step * 0.866;  // sin(60°)
    const r = 1.3 / view.scale;
    const rowStart = Math.floor(wt / dy);
    for (let row = rowStart; row * dy <= wb; row++) {
      const y = row * dy;
      const xOffset = (row % 2) ? step / 2 : 0;
      const startCol = Math.floor((wl - xOffset) / step);
      for (let col = startCol; col * step + xOffset <= wr; col++) {
        const x = col * step + xOffset;
        c.beginPath();
        c.arc(x, y, r, 0, Math.PI * 2);
        c.fill();
      }
    }
  }
}

function drawStrokeTo(c, el) {
  if (!el.points || el.points.length === 0) return;
  c.save();
  if (el.tool === 'highlighter') {
    c.globalAlpha = 0.42;
    c.strokeStyle = el.color;
    c.lineWidth = el.width;
    c.lineCap = 'round';
    c.lineJoin = 'round';
    c.beginPath();
    if (el.points.length === 1) {
      c.arc(el.points[0].x, el.points[0].y, el.width/2, 0, Math.PI*2);
      c.fillStyle = el.color;
      c.fill();
    } else {
      c.moveTo(el.points[0].x, el.points[0].y);
      for (let i = 1; i < el.points.length; i++) c.lineTo(el.points[i].x, el.points[i].y);
      c.stroke();
    }
  } else {
    // Smooth ink: compute polygon outline
    const outline = getStrokeOutline(el.points, el.width * 3, 0.55, 0.32);
    if (outline.length >= 3) {
      c.fillStyle = el.color;
      c.beginPath();
      c.moveTo(outline[0][0], outline[0][1]);
      for (let i = 1; i < outline.length; i++) c.lineTo(outline[i][0], outline[i][1]);
      c.closePath();
      c.fill();
    }
  }
  if (state.selectedIds.has(el.id)) drawSelectionBoxTo(c, el);
  c.restore();
}

function drawShapeTo(c, el) {
  c.save();
  c.strokeStyle = el.color;
  c.lineWidth = el.width;
  c.lineCap = 'round';
  c.lineJoin = 'round';
  c.beginPath();
  const x = el.x, y = el.y, w = el.w, h = el.h;
  if (el.variant === 'rect') c.rect(x, y, w, h);
  else if (el.variant === 'ellipse') c.ellipse(x + w/2, y + h/2, Math.abs(w)/2, Math.abs(h)/2, 0, 0, Math.PI*2);
  else if (el.variant === 'line') { c.moveTo(x, y); c.lineTo(x + w, y + h); }
  else if (el.variant === 'arrow') {
    const x2 = x + w, y2 = y + h;
    c.moveTo(x, y); c.lineTo(x2, y2);
    const angle = Math.atan2(h, w);
    const head = 14 + el.width;
    c.lineTo(x2 - head * Math.cos(angle - 0.4), y2 - head * Math.sin(angle - 0.4));
    c.moveTo(x2, y2);
    c.lineTo(x2 - head * Math.cos(angle + 0.4), y2 - head * Math.sin(angle + 0.4));
  }
  c.stroke();
  if (state.selectedIds.has(el.id)) drawSelectionBoxTo(c, el);
  c.restore();
}

function drawStampTo(c, el) {
  c.save();
  const sz = el.size || 36;
  c.font = sz + 'px -apple-system, BlinkMacSystemFont, "Segoe UI Emoji", "Apple Color Emoji", system-ui, sans-serif';
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText(el.icon || '⭐', el.x, el.y);
  if (state.selectedIds.has(el.id)) drawSelectionBoxTo(c, el);
  c.restore();
}

function drawSelectionBoxTo(c, el) {
  const bbox = getBBox(el);
  if (!bbox) return;
  c.save();
  c.strokeStyle = 'rgba(91,140,90,0.85)';
  c.lineWidth = 1.5 / state.view.scale;
  c.setLineDash([5 / state.view.scale, 4 / state.view.scale]);
  const pad = 5 / state.view.scale;
  c.strokeRect(bbox.x - pad, bbox.y - pad, bbox.w + pad*2, bbox.h + pad*2);
  c.restore();
}

function getBBox(el) {
  if (el.type === 'stroke') {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const p of el.points) {
      if (p.x < minX) minX = p.x;
      if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.y > maxY) maxY = p.y;
    }
    return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
  }
  if (el.type === 'shape') {
    return { x: Math.min(el.x, el.x+el.w), y: Math.min(el.y, el.y+el.h), w: Math.abs(el.w), h: Math.abs(el.h) };
  }
  if (el.type === 'text' || el.type === 'image' || el.type === 'table' || el.type === 'checkbox') {
    return { x: el.x, y: el.y, w: el.w || 200, h: el.h || 30 };
  }
  if (el.type === 'stamp') {
    const sz = el.size || 36;
    return { x: el.x - sz/2, y: el.y - sz/2, w: sz, h: sz };
  }
  return null;
}

function pointInPolygon(point, polygon) {
  let inside = false;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const xi = polygon[i].x, yi = polygon[i].y;
    const xj = polygon[j].x, yj = polygon[j].y;
    if (((yi > point.y) !== (yj > point.y)) &&
        (point.x < (xj - xi) * (point.y - yi) / (yj - yi + 1e-9) + xi)) inside = !inside;
  }
  return inside;
}

let activeRenderScheduled = false;
function renderActiveOverlay() {
  if (activeRenderScheduled) return;
  activeRenderScheduled = true;
  requestAnimationFrame(() => {
    activeRenderScheduled = false;
    clearCanvas(overlayCtx, overlayCanvas);
    applyOverlayTransform();
    if (activeDraw) {
      if (activeDraw.type === 'stroke') drawStrokeTo(overlayCtx, activeDraw);
      else if (activeDraw.type === 'shape') drawShapeTo(overlayCtx, activeDraw);
    }
    // Remote peers' in-progress strokes (live broadcast via Y.js awareness).
    // Only render peers viewing the same note + page as us.
    if (syncProvider && syncProvider.awareness) {
      const myClientId = syncProvider.awareness.clientID;
      syncProvider.awareness.getStates().forEach((st, cid) => {
        if (cid === myClientId || !st || !st.liveStroke) return;
        if (st.liveStroke.noteId !== state.currentNoteId) return;
        if (st.liveStroke.pageId !== state.currentPageId) return;
        const s = st.liveStroke.stroke;
        if (s && s.type === 'stroke') drawStrokeTo(overlayCtx, s);
      });
    }
  });
}

// ============================================================
// Live stroke broadcasting (awareness)
// ============================================================
// Peers see your stroke draw in real-time, not just after pointer-up.
// Awareness is ephemeral state — it doesn't pollute the persistent doc.
let lastLiveBroadcastTs = 0;
const LIVE_BROADCAST_HZ = 60;
function broadcastLiveStroke() {
  if (!syncProvider || !syncProvider.awareness) return;
  if (!activeDraw || activeDraw.type !== 'stroke') return;
  const now = performance.now();
  if (now - lastLiveBroadcastTs < 1000 / LIVE_BROADCAST_HZ) return;
  lastLiveBroadcastTs = now;
  try {
    syncProvider.awareness.setLocalStateField('liveStroke', {
      noteId: state.currentNoteId,
      pageId: state.currentPageId,
      stroke: activeDraw,
    });
  } catch (_) { /* awareness mid-teardown */ }
}
function clearLiveStroke() {
  if (!syncProvider || !syncProvider.awareness) return;
  try { syncProvider.awareness.setLocalStateField('liveStroke', null); } catch (_) {}
}

// ============================================================
// DOM Overlays (text, image, table)
// ============================================================
function renderOverlays() {
  overlaysContainer.innerHTML = '';
  const page = currentPage();
  if (!page) return;
  for (const el of page.elements) {
    if (el.type === 'text') {
      const div = document.createElement('div');
      const isSticky = el.style === 'sticky';
      div.className = 'element-overlay text-element' + (isSticky ? ' sticky' : '') + (state.selectedIds.has(el.id) ? ' selected' : '');
      div.dataset.id = el.id;
      div.contentEditable = 'true';
      div.style.left = el.x + 'px';
      div.style.top = el.y + 'px';
      div.style.minWidth = (el.w || 200) + 'px';
      div.style.color = el.color || '#1a1a1a';
      if (isSticky && el.bgColor) div.style.background = el.bgColor;
      div.textContent = el.content || '';
      div.addEventListener('input', () => { el.content = div.textContent; save(); });
      div.addEventListener('blur', () => {
        if (!el.content || !el.content.trim()) {
          page.elements = page.elements.filter(e => e.id !== el.id);
          render(); save();
        }
      });
      attachOverlayDrag(div, el);
      overlaysContainer.appendChild(div);
    } else if (el.type === 'checkbox') {
      const div = document.createElement('div');
      div.className = 'element-overlay checkbox-element' + (el.checked ? ' checked' : '') + (state.selectedIds.has(el.id) ? ' selected' : '');
      div.dataset.id = el.id;
      div.style.left = el.x + 'px';
      div.style.top = el.y + 'px';
      div.style.minWidth = (el.w || 220) + 'px';
      const box = document.createElement('span');
      box.className = 'cb-box';
      box.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      box.addEventListener('pointerdown', (ev) => {
        ev.stopPropagation();
        snapshot();
        el.checked = !el.checked;
        render(); save();
      });
      const label = document.createElement('span');
      label.className = 'cb-label';
      label.contentEditable = 'true';
      label.textContent = el.content || '';
      label.addEventListener('input', () => { el.content = label.textContent; save(); });
      label.addEventListener('blur', () => {
        if ((!el.content || !el.content.trim()) && !el.checked) {
          page.elements = page.elements.filter(e => e.id !== el.id);
          render(); save();
        }
      });
      div.appendChild(box);
      div.appendChild(label);
      attachOverlayDrag(div, el);
      overlaysContainer.appendChild(div);
    } else if (el.type === 'image') {
      const div = document.createElement('div');
      div.className = 'element-overlay image-element' + (state.selectedIds.has(el.id) ? ' selected' : '');
      div.dataset.id = el.id;
      div.style.left = el.x + 'px';
      div.style.top = el.y + 'px';
      div.style.width = el.w + 'px';
      div.style.height = el.h + 'px';
      const img = document.createElement('img');
      img.src = el.src;
      div.appendChild(img);
      attachOverlayDrag(div, el);
      overlaysContainer.appendChild(div);
    } else if (el.type === 'table') {
      const tbl = document.createElement('table');
      tbl.className = 'element-overlay table-element' + (state.selectedIds.has(el.id) ? ' selected' : '');
      tbl.dataset.id = el.id;
      tbl.style.left = el.x + 'px';
      tbl.style.top = el.y + 'px';
      for (let r = 0; r < el.rows; r++) {
        const tr = document.createElement('tr');
        for (let cIdx = 0; cIdx < el.cols; cIdx++) {
          const td = document.createElement('td');
          td.contentEditable = 'true';
          td.textContent = (el.cells[r] && el.cells[r][cIdx]) || '';
          td.addEventListener('input', () => {
            if (!el.cells[r]) el.cells[r] = [];
            el.cells[r][cIdx] = td.textContent;
            save();
          });
          tr.appendChild(td);
        }
        tbl.appendChild(tr);
      }
      attachOverlayDrag(tbl, el);
      overlaysContainer.appendChild(tbl);
    }
  }
}

function attachOverlayDrag(node, el) {
  let dragging = false, startX = 0, startY = 0, origX = 0, origY = 0, snap = false;
  node.addEventListener('pointerdown', (ev) => {
    if (state.currentTool !== 'lasso') return;
    if (ev.target.isContentEditable && document.activeElement === ev.target) return;
    dragging = true; snap = false;
    startX = ev.clientX; startY = ev.clientY;
    origX = el.x; origY = el.y;
    state.selectedIds.clear();
    state.selectedIds.add(el.id);
    renderInspector(); render();
    try { node.setPointerCapture(ev.pointerId); } catch(e){}
    ev.stopPropagation();
  });
  node.addEventListener('pointermove', (ev) => {
    if (!dragging) return;
    const scale = state.view.scale;
    el.x = origX + (ev.clientX - startX) / scale;
    el.y = origY + (ev.clientY - startY) / scale;
    node.style.left = el.x + 'px';
    node.style.top = el.y + 'px';
    if (!snap) { snapshot(); snap = true; }
    ev.stopPropagation();
  });
  const endDrag = (ev) => {
    if (!dragging) return;
    dragging = false;
    if (snap) save();
    ev.stopPropagation();
  };
  node.addEventListener('pointerup', endDrag);
  node.addEventListener('pointercancel', endDrag);
}

// ============================================================
// History
// ============================================================
function snapshot() {
  state.history.push(JSON.stringify({ folders: state.folders, notes: state.notes, pages: state.pages }));
  if (state.history.length > 40) state.history.shift();
  state.redoStack = [];
}
function applySnapshot(json) {
  const p = JSON.parse(json);
  state.folders = p.folders; state.notes = p.notes; state.pages = p.pages;
  if (!state.notes[state.currentNoteId]) {
    const first = state.folders[0];
    if (first && first.noteIds[0]) state.currentNoteId = first.noteIds[0];
  }
  const note = state.notes[state.currentNoteId];
  if (note && !note.pageIds.includes(state.currentPageId)) {
    state.currentPageId = note.pageIds[0];
  }
}
function undo() {
  if (state.history.length === 0) return;
  state.redoStack.push(JSON.stringify({ folders: state.folders, notes: state.notes, pages: state.pages }));
  applySnapshot(state.history.pop());
  renderSidebar(); renderPageTabs(); render(); save();
}
function redo() {
  if (state.redoStack.length === 0) return;
  state.history.push(JSON.stringify({ folders: state.folders, notes: state.notes, pages: state.pages }));
  applySnapshot(state.redoStack.pop());
  renderSidebar(); renderPageTabs(); render(); save();
}

// ============================================================
// Pointer wiring & tools
// ============================================================
let activeDraw = null;
let isPointerDown = false;
let panState = null;

canvas.addEventListener('pointerdown', (e) => {
  // Hand tool accepts any pointer; other tools require pen/mouse
  if (state.currentTool !== 'hand' && e.pointerType === 'touch') return;
  try { canvas.setPointerCapture(e.pointerId); } catch(err){}
  e.preventDefault();
  isPointerDown = true;
  const t = tools[state.currentTool];
  if (t && t.down) t.down(e);
});
canvas.addEventListener('pointermove', (e) => {
  if (!isPointerDown) return;
  if (state.currentTool !== 'hand' && e.pointerType === 'touch') return;
  e.preventDefault();
  const t = tools[state.currentTool];
  if (t && t.move) t.move(e);
});
function endCanvasPointer(e) {
  if (!isPointerDown) return;
  isPointerDown = false;
  const t = tools[state.currentTool];
  if (t && t.up) t.up(e);
}
canvas.addEventListener('pointerup', endCanvasPointer);
canvas.addEventListener('pointercancel', endCanvasPointer);
canvas.addEventListener('pointerleave', endCanvasPointer);

const tools = {
  pen: {
    down(e) {
      const pos = getCanvasPoint(e);
      const s = state.toolSettings.pen;
      activeDraw = {
        id: uid(), type: 'stroke', tool: 'pen',
        color: s.color, width: s.width,
        points: [{ x: pos.x, y: pos.y, p: e.pressure || 0.5 }],
      };
      broadcastLiveStroke();
      renderActiveOverlay();
    },
    move(e) {
      if (!activeDraw) return;
      const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
      for (const ce of events) {
        const pos = getCanvasPoint(ce);
        const prev = activeDraw.points[activeDraw.points.length - 1];
        const dx = pos.x - prev.x, dy = pos.y - prev.y;
        if (dx*dx + dy*dy < 0.6) continue;
        activeDraw.points.push({ x: pos.x, y: pos.y, p: ce.pressure || 0.5 });
      }
      broadcastLiveStroke();
      renderActiveOverlay();
    },
    up() {
      if (!activeDraw) return;
      if (activeDraw.points.length > 0) {
        snapshot();
        currentPage().elements.push(activeDraw);
        // Push persistent state to peers BEFORE clearing the live awareness
        // stroke. Both messages go down the same WebSocket so peer receives
        // the committed stroke first, then the liveStroke clear — no flicker.
        saveNow();
      }
      clearLiveStroke();
      activeDraw = null;
      render();
    },
  },

  highlighter: {
    down(e) {
      const pos = getCanvasPoint(e);
      const s = state.toolSettings.highlighter;
      activeDraw = {
        id: uid(), type: 'stroke', tool: 'highlighter',
        color: s.color, width: s.width,
        points: [{ x: pos.x, y: pos.y, p: 1 }],
      };
      broadcastLiveStroke();
      renderActiveOverlay();
    },
    move(e) {
      if (!activeDraw) return;
      const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
      const pts = activeDraw.points;
      for (const ce of events) {
        const pos = getCanvasPoint(ce);
        const prev = pts[pts.length-1];
        if ((pos.x-prev.x)**2 + (pos.y-prev.y)**2 < 4) continue;
        pts.push({ x: pos.x, y: pos.y, p: 1 });
      }
      broadcastLiveStroke();
      renderActiveOverlay();
    },
    up() {
      if (!activeDraw) return;
      if (activeDraw.points.length > 0) {
        snapshot();
        currentPage().elements.push(activeDraw);
        saveNow();
      }
      clearLiveStroke();
      activeDraw = null;
      render();
    },
  },

  eraser: {
    snap: false,
    down(e) { this.snap = false; this.move(e); },
    move(e) {
      const pos = getCanvasPoint(e);
      const r = state.toolSettings.eraser.width;
      const page = currentPage();
      const remove = new Set();
      for (const el of page.elements) {
        if (el.type !== 'stroke' && el.type !== 'shape') continue;
        const bbox = getBBox(el);
        if (!bbox) continue;
        if (pos.x < bbox.x - r || pos.x > bbox.x + bbox.w + r ||
            pos.y < bbox.y - r || pos.y > bbox.y + bbox.h + r) continue;
        if (el.type === 'stroke') {
          for (const p of el.points) {
            if ((p.x-pos.x)**2 + (p.y-pos.y)**2 < r*r) { remove.add(el.id); break; }
          }
        } else remove.add(el.id);
      }
      if (remove.size > 0) {
        if (!this.snap) { snapshot(); this.snap = true; }
        page.elements = page.elements.filter(x => !remove.has(x.id));
        render();
      }
      // indicator on overlay
      clearCanvas(overlayCtx, overlayCanvas);
      applyOverlayTransform();
      overlayCtx.strokeStyle = 'rgba(0,0,0,0.45)';
      overlayCtx.lineWidth = 1 / state.view.scale;
      overlayCtx.beginPath();
      overlayCtx.arc(pos.x, pos.y, r, 0, Math.PI*2);
      overlayCtx.stroke();
    },
    up() {
      clearCanvas(overlayCtx, overlayCanvas);
      if (this.snap) save();
    },
  },

  lasso: {
    path: null, dragging: false, dragSnap: false, dragStart: null,
    down(e) {
      const pos = getCanvasPoint(e);
      // Check if clicking inside existing selection
      if (state.selectedIds.size > 0) {
        const page = currentPage();
        for (const id of state.selectedIds) {
          const el = page.elements.find(x => x.id === id);
          if (!el) continue;
          const bbox = getBBox(el);
          if (!bbox) continue;
          const pad = 8 / state.view.scale;
          if (pos.x >= bbox.x - pad && pos.x <= bbox.x + bbox.w + pad &&
              pos.y >= bbox.y - pad && pos.y <= bbox.y + bbox.h + pad) {
            this.dragging = true;
            this.dragStart = pos;
            this.dragSnap = false;
            return;
          }
        }
      }
      this.dragging = false;
      this.path = [pos];
      state.selectedIds.clear();
      renderInspector(); render();
    },
    move(e) {
      const pos = getCanvasPoint(e);
      if (this.dragging) {
        if (!this.dragSnap) { snapshot(); this.dragSnap = true; }
        const dx = pos.x - this.dragStart.x;
        const dy = pos.y - this.dragStart.y;
        const page = currentPage();
        for (const id of state.selectedIds) {
          const el = page.elements.find(x => x.id === id);
          if (!el) continue;
          translateEl(el, dx, dy);
        }
        this.dragStart = pos;
        render();
        return;
      }
      if (!this.path) return;
      this.path.push(pos);
      clearCanvas(overlayCtx, overlayCanvas);
      applyOverlayTransform();
      overlayCtx.strokeStyle = 'rgba(91,140,90,0.9)';
      overlayCtx.fillStyle = 'rgba(91,140,90,0.08)';
      overlayCtx.lineWidth = 1.5 / state.view.scale;
      overlayCtx.setLineDash([5 / state.view.scale, 3 / state.view.scale]);
      overlayCtx.beginPath();
      overlayCtx.moveTo(this.path[0].x, this.path[0].y);
      for (let i = 1; i < this.path.length; i++) overlayCtx.lineTo(this.path[i].x, this.path[i].y);
      overlayCtx.closePath();
      overlayCtx.fill();
      overlayCtx.stroke();
      overlayCtx.setLineDash([]);
    },
    up(e) {
      if (this.dragging) {
        this.dragging = false;
        if (this.dragSnap) save();
        return;
      }
      if (this.path && this.path.length > 3) {
        const page = currentPage();
        state.selectedIds.clear();
        for (const el of page.elements) {
          if (el.type === 'stroke') {
            for (const p of el.points) {
              if (pointInPolygon(p, this.path)) { state.selectedIds.add(el.id); break; }
            }
          } else {
            const bbox = getBBox(el);
            if (!bbox) continue;
            const center = { x: bbox.x + bbox.w/2, y: bbox.y + bbox.h/2 };
            if (pointInPolygon(center, this.path)) state.selectedIds.add(el.id);
          }
        }
        renderInspector();
      }
      this.path = null;
      clearCanvas(overlayCtx, overlayCanvas);
      render();
    },
  },

  shape: {
    down(e) {
      const pos = snapToGrid(getCanvasPoint(e));
      const s = state.toolSettings.shape;
      activeDraw = {
        id: uid(), type: 'shape',
        variant: s.variant,
        color: s.color, width: s.width,
        x: pos.x, y: pos.y, w: 0, h: 0,
      };
      renderActiveOverlay();
    },
    move(e) {
      if (!activeDraw) return;
      const pos = snapToGrid(getCanvasPoint(e));
      activeDraw.w = pos.x - activeDraw.x;
      activeDraw.h = pos.y - activeDraw.y;
      renderActiveOverlay();
    },
    up() {
      if (!activeDraw) return;
      if (Math.abs(activeDraw.w) > 3 || Math.abs(activeDraw.h) > 3) {
        snapshot();
        currentPage().elements.push(activeDraw);
        save();
      }
      activeDraw = null;
      render();
    },
  },

  ruler: {
    down(e) {
      const pos = getCanvasPoint(e);
      const s = state.toolSettings.pen;
      activeDraw = {
        id: uid(), type: 'stroke', tool: 'pen',
        color: s.color, width: s.width,
        points: [{ x: pos.x, y: pos.y, p: 0.7 }, { x: pos.x, y: pos.y, p: 0.7 }],
      };
      renderActiveOverlay();
    },
    move(e) {
      if (!activeDraw) return;
      const pos = getCanvasPoint(e);
      activeDraw.points[1] = { x: pos.x, y: pos.y, p: 0.7 };
      renderActiveOverlay();
    },
    up() {
      if (!activeDraw) return;
      const a = activeDraw.points[0], b = activeDraw.points[1];
      if ((b.x-a.x)**2 + (b.y-a.y)**2 > 9) {
        snapshot();
        currentPage().elements.push(activeDraw);
        save();
      }
      activeDraw = null;
      render();
    },
  },

  text: {
    down(e) {
      const pos = getCanvasPoint(e);
      snapshot();
      const el = {
        id: uid(), type: 'text',
        x: pos.x, y: pos.y, w: 220,
        color: '#1a1a1a',
        content: '',
      };
      currentPage().elements.push(el);
      save();
      setTool('lasso');
      state.selectedIds.clear();
      state.selectedIds.add(el.id);
      render();
      setTimeout(() => {
        const node = overlaysContainer.querySelector(`[data-id="${el.id}"]`);
        if (node) { node.focus(); placeCaretAtEnd(node); }
      }, 30);
    },
    move() {}, up() {},
  },

  image: { down() { document.getElementById('image-input').click(); }, move(){}, up(){} },

  table: {
    down(e) {
      const pos = getCanvasPoint(e);
      snapshot();
      const el = {
        id: uid(), type: 'table',
        x: pos.x, y: pos.y, w: 280, h: 100,
        rows: 3, cols: 3,
        cells: [['','',''],['','',''],['','','']],
      };
      currentPage().elements.push(el);
      render(); save();
      setTool('lasso');
    },
    move(){}, up(){},
  },

  hand: {
    down(e) {
      panState = { x: e.clientX, y: e.clientY, viewX: state.view.x, viewY: state.view.y };
    },
    move(e) {
      if (!panState) return;
      state.view.x = panState.viewX + (e.clientX - panState.x);
      state.view.y = panState.viewY + (e.clientY - panState.y);
      render();
    },
    up() { panState = null; save(); },
  },

  sticky: {
    down(e) {
      const pos = getCanvasPoint(e);
      snapshot();
      const el = {
        id: uid(), type: 'text', style: 'sticky',
        x: pos.x, y: pos.y, w: 180,
        color: '#1a1a1a',
        bgColor: state.toolSettings.sticky.color,
        content: '',
      };
      currentPage().elements.push(el);
      save();
      setTool('lasso');
      state.selectedIds.clear();
      state.selectedIds.add(el.id);
      render();
      setTimeout(() => {
        const node = overlaysContainer.querySelector(`[data-id="${el.id}"]`);
        if (node) { node.focus(); placeCaretAtEnd(node); }
      }, 30);
    },
    move() {}, up() {},
  },

  checkbox: {
    down(e) {
      const pos = getCanvasPoint(e);
      snapshot();
      const el = {
        id: uid(), type: 'checkbox',
        x: pos.x, y: pos.y, w: 240, h: 32,
        checked: false,
        content: '',
      };
      currentPage().elements.push(el);
      save();
      setTool('lasso');
      state.selectedIds.clear();
      state.selectedIds.add(el.id);
      render();
      setTimeout(() => {
        const node = overlaysContainer.querySelector(`[data-id="${el.id}"] .cb-label`);
        if (node) { node.focus(); placeCaretAtEnd(node); }
      }, 30);
    },
    move() {}, up() {},
  },

  stamp: {
    down(e) {
      const pos = getCanvasPoint(e);
      const s = state.toolSettings.stamp;
      snapshot();
      const el = {
        id: uid(), type: 'stamp',
        x: pos.x, y: pos.y,
        icon: s.icon || '⭐',
        size: s.size || 36,
      };
      currentPage().elements.push(el);
      render(); save();
    },
    move() {}, up() {},
  },
};

function placeCaretAtEnd(el) {
  el.focus();
  if (typeof window.getSelection !== 'undefined' && typeof document.createRange !== 'undefined') {
    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }
}
function translateEl(el, dx, dy) {
  if (el.type === 'stroke') { for (const p of el.points) { p.x += dx; p.y += dy; } }
  else { el.x += dx; el.y += dy; }
}

// ============================================================
// Pinch zoom (iPad)
// ============================================================
let pinch = null;
canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    pinch = {
      d: Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY),
      cx: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      cy: (e.touches[0].clientY + e.touches[1].clientY) / 2,
      scale: state.view.scale,
      vx: state.view.x, vy: state.view.y,
    };
  }
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2 && pinch) {
    e.preventDefault();
    const newD = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const newCx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const newCy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const newScale = clamp(pinch.scale * (newD / pinch.d), 0.25, 6);
    const ratio = newScale / pinch.scale;
    const rect = canvas.getBoundingClientRect();
    const cx = pinch.cx - rect.left, cy = pinch.cy - rect.top;
    state.view.scale = newScale;
    state.view.x = cx - (cx - pinch.vx) * ratio + (newCx - pinch.cx);
    state.view.y = cy - (cy - pinch.vy) * ratio + (newCy - pinch.cy);
    render();
    updateZoomDisplay();
  }
}, { passive: false });
canvas.addEventListener('touchend', () => { pinch = null; save(); });

// Wheel zoom on desktop (Ctrl/Cmd + scroll)
canvas.addEventListener('wheel', (e) => {
  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.1 : 1/1.1;
    const newScale = clamp(state.view.scale * factor, 0.25, 6);
    const ratio = newScale / state.view.scale;
    state.view.x = cx - (cx - state.view.x) * ratio;
    state.view.y = cy - (cy - state.view.y) * ratio;
    state.view.scale = newScale;
    render();
    updateZoomDisplay();
    save();
  } else {
    // scroll = pan vertically
    e.preventDefault();
    state.view.y -= e.deltaY;
    state.view.x -= e.deltaX;
    render();
    save();
  }
}, { passive: false });

function zoomBy(factor) {
  const cx = canvas.clientWidth / 2;
  const cy = canvas.clientHeight / 2;
  const newScale = clamp(state.view.scale * factor, 0.25, 6);
  const ratio = newScale / state.view.scale;
  state.view.x = cx - (cx - state.view.x) * ratio;
  state.view.y = cy - (cy - state.view.y) * ratio;
  state.view.scale = newScale;
  render();
  updateZoomDisplay();
  save();
}
function resetZoom() {
  state.view = { x: 0, y: 0, scale: 1 };
  render();
  updateZoomDisplay();
  save();
}
function updateZoomDisplay() {
  document.getElementById('zoom-level').textContent = Math.round(state.view.scale * 100) + '%';
}
document.getElementById('zoom-in').addEventListener('click', () => zoomBy(1.2));
document.getElementById('zoom-out').addEventListener('click', () => zoomBy(1/1.2));
document.getElementById('zoom-reset').addEventListener('click', resetZoom);

// ============================================================
// Sidebar
// ============================================================
const folderList = document.getElementById('folder-list');
function renderSidebar() {
  folderList.innerHTML = '';
  for (const folder of state.folders) {
    const fEl = document.createElement('div');
    fEl.className = 'folder' + (folder.expanded ? '' : ' collapsed');
    const header = document.createElement('div');
    header.className = 'folder-header';
    header.innerHTML = `
      <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      <span class="folder-name" contenteditable="true">${esc(folder.name)}</span>
      <span class="folder-actions">
        <button class="icon-btn" data-act="del" title="Delete folder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
      </span>
    `;
    header.querySelector('.chevron').addEventListener('click', (e) => {
      e.stopPropagation();
      folder.expanded = !folder.expanded;
      renderSidebar(); save();
    });
    header.querySelector('.folder-name').addEventListener('blur', (ev) => {
      folder.name = ev.target.textContent.trim() || 'Untitled folder';
      save();
    });
    header.querySelector('.folder-name').addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter') { ev.preventDefault(); ev.target.blur(); }
    });
    header.querySelector('[data-act="del"]').addEventListener('click', (ev) => {
      ev.stopPropagation();
      if (!confirm('Delete "' + folder.name + '" and all its notes?')) return;
      snapshot();
      for (const nid of folder.noteIds) {
        const n = state.notes[nid];
        if (n) { for (const pid of n.pageIds) delete state.pages[pid]; delete state.notes[nid]; }
      }
      state.folders = state.folders.filter(f => f.id !== folder.id);
      if (state.folders.length === 0) seed();
      const fb = state.folders[0];
      if (fb && fb.noteIds[0]) {
        state.currentNoteId = fb.noteIds[0];
        state.currentPageId = state.notes[state.currentNoteId].pageIds[0];
      }
      renderSidebar(); renderPageTabs(); render(); save();
    });
    fEl.appendChild(header);

    const noteList = document.createElement('div');
    noteList.className = 'note-list';
    for (const nid of folder.noteIds) {
      const note = state.notes[nid]; if (!note) continue;
      const item = document.createElement('div');
      item.className = 'note-item' + (state.currentNoteId === nid ? ' active' : '');
      item.innerHTML = `
        <svg class="note-icon" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span class="note-title" contenteditable="true">${esc(note.title || 'Untitled')}</span>
        <span class="note-actions">
          <button class="icon-btn" data-act="del-note" title="Delete note"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
        </span>
      `;
      item.addEventListener('click', (ev) => { if (ev.target.closest('[data-act]')) return; openNote(nid); });
      const ti = item.querySelector('.note-title');
      ti.addEventListener('click', (ev) => ev.stopPropagation());
      ti.addEventListener('blur', (ev) => {
        note.title = ev.target.textContent.trim() || 'Untitled';
        document.getElementById('note-title-input').value = note.title;
        save();
      });
      ti.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') { ev.preventDefault(); ev.target.blur(); } });
      item.querySelector('[data-act="del-note"]').addEventListener('click', (ev) => {
        ev.stopPropagation();
        if (!confirm('Delete note "' + note.title + '"?')) return;
        snapshot();
        for (const pid of note.pageIds) delete state.pages[pid];
        delete state.notes[nid];
        folder.noteIds = folder.noteIds.filter(x => x !== nid);
        if (folder.noteIds.length === 0) {

function closePageSettings() { pageSettingsEl.classList.remove('show'); }
function makeTemplatePreview(template) {
  const c = document.createElement('canvas');
  c.width = 50; c.height = 38;
  c.style.width = '50px'; c.style.height = '38px';
  const cx = c.getContext('2d');
  cx.fillStyle = '#fdfcf7';
  cx.fillRect(0, 0, 50, 38);
  cx.strokeStyle = 'rgba(180, 170, 150, 0.7)';
  cx.fillStyle = 'rgba(150, 140, 120, 1)';
  cx.lineWidth = 0.5;
  if (template === 'lined') {
    cx.beginPath();
    for (let y = 6; y < 38; y += 6) { cx.moveTo(2, y); cx.lineTo(48, y); }
    cx.stroke();
  } else if (template === 'wideline') {
    cx.beginPath();
    for (let y = 10; y < 38; y += 10) { cx.moveTo(2, y); cx.lineTo(48, y); }
    cx.stroke();
  } else if (template === 'grid') {
    cx.beginPath();
    for (let y = 5; y < 38; y += 5) { cx.moveTo(2, y); cx.lineTo(48, y); }
    for (let x = 5; x < 50; x += 5) { cx.moveTo(x, 2); cx.lineTo(x, 36); }
    cx.stroke();
  } else if (template === 'squares') {
    cx.beginPath();
    for (let y = 8; y < 38; y += 8) { cx.moveTo(2, y); cx.lineTo(48, y); }
    for (let x = 8; x < 50; x += 8) { cx.moveTo(x, 2); cx.lineTo(x, 36); }
    cx.stroke();
  } else if (template === 'dots') {
    for (let y = 5; y < 38; y += 5) {
      for (let x = 5; x < 50; x += 5) {
        cx.beginPath(); cx.arc(x, y, 0.7, 0, Math.PI * 2); cx.fill();
      }
    }
  } else if (template === 'margin') {
    cx.beginPath();
    for (let y = 6; y < 38; y += 6) { cx.moveTo(2, y); cx.lineTo(48, y); }
    cx.stroke();
    cx.save();
    cx.strokeStyle = 'rgba(220, 100, 100, 0.7)';
    cx.beginPath(); cx.moveTo(10, 2); cx.lineTo(10, 36);
    cx.stroke();
    cx.restore();
  } else if (template === 'cornell') {
    cx.beginPath();
    for (let y = 6; y < 30; y += 6) { cx.moveTo(2, y); cx.lineTo(48, y); }
    cx.stroke();
    cx.save();
    cx.strokeStyle = 'rgba(220, 100, 100, 0.7)';
    cx.beginPath(); cx.moveTo(16, 2);  cx.lineTo(16, 30);
    cx.moveTo(2, 30);  cx.lineTo(48, 30);
    cx.stroke();
    cx.restore();
  } else if (template === 'music') {
    cx.beginPath();
    // Two staves of 5 lines each
    for (let i = 0; i < 5; i++) { cx.moveTo(4, 6 + i * 2); cx.lineTo(46, 6 + i * 2); }
    for (let i = 0; i < 5; i++) { cx.moveTo(4, 24 + i * 2); cx.lineTo(46, 24 + i * 2); }
    cx.stroke();
  } else if (template === 'isometric') {
    for (let row = 0; row < 8; row++) {
      const xOff = (row % 2) ? 2.5 : 0;
      for (let x = 3 + xOff; x < 50; x += 5) {
        cx.beginPath(); cx.arc(x, 4 + row * 4.3, 0.8, 0, Math.PI * 2); cx.fill();
      }
    }
  }
  return c;
}

const inspector = document.getElementById('inspector');

    sec.appendChild(lbl); sec.appendChild(wrap);

    inspector.appendChild(makeColorPicker(PRESET_COLORS, s.color, 'shape', (c) => { s.color = c; renderInspector(); }));

function makeColorPicker(presets, active, toolKey, onSelect) {
  const sec = document.createElement('div');
  sec.className = 'inspector-section';

  for (const c of presets) {
    const sw = document.createElement('button');

    sw.style.background = c;
    sw.addEventListener('click', () => onSelect(c));
    wrap.appendChild(sw);
  }
  // Custom color picker — uses native <input type=color>
  const customWrap = document.createElement('label');
  customWrap.className = 'color-swatch custom' + (active && !presets.includes(active) ? ' active' : '');
  customWrap.title = 'Custom color';
  const customInput = document.createElement('input');
  customInput.type = 'color';
  customInput.value = state.customColors[toolKey] || active;
  customInput.addEventListener('input', () => {
    state.customColors[toolKey] = customInput.value;
    onSelect(customInput.value);
  });
  customWrap.appendChild(customInput);
  wrap.appendChild(customWrap);
  sec.appendChild(lbl); sec.appendChild(wrap);
  return sec;
}

function makeSizeSlider(min, max, step, value, onInput, previewColor) {
  const sec = document.createElement('div');
  sec.className = 'inspector-section';
  const lbl = document.createElement('span');
  lbl.className = 'inspector-label';
  lbl.textContent = 'Size';
  const wrap = document.createElement('div');
  wrap.className = 'size-slider-wrap';
  const preview = document.createElement('div');
  preview.className = 'size-preview';
  const dot = document.createElement('span');
  dot.className = 'dot';
  const dotSize = clamp(value, 2, 22);
  dot.style.width = dotSize + 'px';
  dot.style.height = dotSize + 'px';
  dot.style.background = previewColor;
  preview.appendChild(dot);
  const slider = document.createElement('input');
  slider.type = 'range';
  slider.className = 'size-slider';
  slider.min = min; slider.max = max; slider.step = step;
  slider.value = value;
  const val = document.createElement('span');
  val.className = 'size-value';
  val.textContent = parseFloat(value).toFixed(1);
  slider.addEventListener('input', () => {

    const ds = clamp(v, 2, 22);
    dot.style.width = ds + 'px';
    dot.style.height = ds + 'px';
    onInput(v);
  });
  wrap.appendChild(preview); wrap.appendChild(slider); wrap.appendChild(val);
  sec.appendChild(lbl); sec.appendChild(wrap);
  return sec;
}

// Image upload + paste
// ============================================================
function ingestImage(dataUrl) {
  const img = new Image();
  img.onload = () => {
    snapshot();
    const maxW = 360, maxH = 360;
    let w = img.width, h = img.height;
    if (w > maxW) { h = h * (maxW/w); w = maxW; }
    if (h > maxH) { w = w * (maxH/h); h = maxH; }
    const view = state.view;
    // Drop image at center of viewport in world coords
    const cx = (canvas.clientWidth/2 - view.x) / view.scale - w/2;
    const cy = (canvas.clientHeight/2 - view.y) / view.scale - h/2;
    currentPage().elements.push({
      id: uid(), type: 'image', x: cx, y: cy, w, h, src: dataUrl,
    });
    render(); save();
  };
  img.src = dataUrl;
}
document.getElementById('image-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = (ev) => ingestImage(ev.target.result);
  r.readAsDataURL(file);
  e.target.value = '';
});
window.addEventListener('paste', (e) => {
  const items = e.clipboardData ? e.clipboardData.items : [];
  for (const it of items) {
    if (it.type && it.type.startsWith('image/')) {
      const f = it.getAsFile();
      const r = new FileReader();
      r.onload = (ev) => ingestImage(ev.target.result);
      r.readAsDataURL(f);
      e.preventDefault();
      return;
    }
  }
});

window.addEventListener('keydown', (e) => {
  if (e.target.isContentEditable || e.target.tagName === 'INPUT') return;
  if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
  if ((e.metaKey || e.ctrlKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); return; }
  if ((e.metaKey || e.ctrlKey) && e.key === '0') { e.preventDefault(); resetZoom(); return; }
  if ((e.metaKey || e.ctrlKey) && (e.key === '=' || e.key === '+')) { e.preventDefault(); zoomBy(1.2); return; }
  if ((e.metaKey || e.ctrlKey) && e.key === '-') { e.preventDefault(); zoomBy(1/1.2); return; }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (state.selectedIds.size > 0) {
      e.preventDefault();
      snapshot();
      const page = currentPage();
      page.elements = page.elements.filter(el => !state.selectedIds.has(el.id));
      state.selectedIds.clear();
      render(); save(); renderInspector();
      return;
    }
  }
  const map = { p:'pen', h:'highlighter', e:'eraser', l:'lasso', s:'shape', r:'ruler', t:'text', i:'image', b:'table', ' ':'hand' };
  if (map[e.key]) { e.preventDefault(); setTool(map[e.key]); }
});
