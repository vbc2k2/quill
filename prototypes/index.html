// Status
// ============================================================
const statusEl = document.getElementById('status');
let statusTimer = null;
function flashStatus(text) {
  statusEl.textContent = text;
  statusEl.classList.add('show');
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => statusEl.classList.remove('show'), 1100);
}

// ============================================================
// Wire-up
// ============================================================
document.getElementById('sidebar-toggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('collapsed');
  setTimeout(resize, 260);
});
document.getElementById('new-folder-btn').addEventListener('click', addFolder);
document.getElementById('note-title-input').addEventListener('input', (e) => {
  if (state.currentNoteId) {
    state.notes[state.currentNoteId].title = e.target.value || 'Untitled';
    renderSidebar(); save();
  }
});
document.getElementById('undo-btn').addEventListener('click', undo);
document.getElementById('redo-btn').addEventListener('click', redo);

document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('touchmove', e => {
  if (e.target.closest('#canvas-container')) e.preventDefault();
}, { passive: false });
window.addEventListener('contextmenu', e => {
  if (e.target.closest('#canvas-container')) e.preventDefault();
});

// ============================================================
// Init
// ============================================================
if (!load()) seed();
if (!state.currentNoteId || !state.notes[state.currentNoteId]) {
  if (state.folders.length === 0 || state.folders[0].noteIds.length === 0) seed();
  state.currentNoteId = state.folders[0].noteIds[0];
  state.currentPageId = state.notes[state.currentNoteId].pageIds[0];
}
document.getElementById('note-title-input').value = state.notes[state.currentNoteId].title || '';
document.body.dataset.tool = state.currentTool;
loadTheme(); // Apply saved theme BEFORE first render so no light-mode flash
renderSidebar();
renderPageTabs();
renderToolbar();
renderInspector();
updateZoomDisplay();
window.addEventListener('resize', resize);
setTimeout(resize, 50);

// ============================================================
// Sync (Y.js + y-websocket — wired in once the module script loads)
// ============================================================
let syncDoc = null;
let syncProvider = null;
let syncMap = null;
let isApplyingRemote = false;
let initialSyncReady = false;
let syncSent = 0;
let syncReceived = 0;

function updateSyncCounters() {
  const s = document.getElementById('sync-sent-count');
  const r = document.getElementById('sync-recv-count');
  if (s) s.textContent = syncSent;
  if (r) r.textContent = syncReceived;
}

function resolveWsUrl() {
  if (location.protocol === 'file:' || !location.host) return 'wss://demos.yjs.dev/ws';
  return `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`;
}

function setSyncStatus(s) {
  const ind = document.querySelector('#sync-bar .indicator');
  const txt = document.getElementById('sync-status-text');
  const btn = document.getElementById('sync-connect-btn');
  if (!ind || !txt || !btn) return;
  ind.className = 'indicator';
  if (s === 'connecting')        { ind.classList.add('connecting');   txt.textContent = 'Connecting…'; btn.textContent = 'Cancel'; }
  else if (s === 'connected')    { ind.classList.add('connected');    txt.textContent = 'Synced';      btn.textContent = 'Disconnect'; }
  else if (s === 'disconnected') { ind.classList.add('disconnected'); txt.textContent = 'Disconnected';btn.textContent = 'Connect'; }
  else                           {                                    txt.textContent = 'Offline';    btn.textContent = 'Connect'; }
}

function pushToSync(data) {
  if (!syncMap) {
    console.log('[sync] push skipped: not connected');
    return;
  }
  if (isApplyingRemote) {
    console.log('[sync] push skipped: applying remote state');
    return;
  }
  if (!initialSyncReady) {
    console.log('[sync] push skipped: initial sync not ready yet');
    return;
  }
  try {
    const json = JSON.stringify(data || snapshotState());
    // Direct set — Y.js wraps in an implicit transaction. Avoids any
    // edge case with nested transactions during apply/push cycles.
    syncMap.set('state', json);
    syncSent += 1;
    updateSyncCounters();
    console.log('[sync] pushed', json.length, 'bytes (#' + syncSent + ')');
  } catch (e) {
    flashStatus('Sync push failed: ' + (e.message || e));
    console.warn('[sync] push failed:', e);
  }
}

function applyRemoteState() {
  if (!syncMap) return;
  const json = syncMap.get('state');
  if (!json) return;
  try {
    const parsed = JSON.parse(json);
    isApplyingRemote = true;
    syncReceived += 1;
    updateSyncCounters();
    console.log('[sync] received', json.length, 'bytes (#' + syncReceived + ')');
    if (parsed.folders) state.folders = parsed.folders;
    if (parsed.notes)   state.notes = parsed.notes;
    if (parsed.pages)   state.pages = parsed.pages;
    if (parsed.customColors) state.customColors = parsed.customColors;
    if (Array.isArray(parsed.penPresets)) state.penPresets = parsed.penPresets;
    if (parsed.currentNoteId && state.notes[parsed.currentNoteId]) {
      state.currentNoteId = parsed.currentNoteId;
    } else if (!state.notes[state.currentNoteId]) {
      const first = state.folders[0];
      if (first && first.noteIds[0]) state.currentNoteId = first.noteIds[0];
    }
    const note = state.notes[state.currentNoteId];
    if (parsed.currentPageId && state.pages[parsed.currentPageId]) {
      state.currentPageId = parsed.currentPageId;
    } else if (note && note.pageIds[0]) {
      state.currentPageId = note.pageIds[0];
    }
    isApplyingRemote = false;
    // Re-render everything
    if (note) document.getElementById('note-title-input').value = note.title || '';
    renderSidebar();
    renderPageTabs();
    renderInspector();
    render();
    // Persist remote state to localStorage so it survives a reload offline
    try { localStorage.setItem(STORAGE_KEY, json); } catch (_) {}
    flashStatus('Synced');
  } catch (e) {
    isApplyingRemote = false;
    console.error('Apply remote state failed:', e);
  }
}

function syncConnect(room) {
  syncDisconnect();
  if (!window.QuillSync) { flashStatus('Sync library not ready'); return; }
  const { Y, WebsocketProvider } = window.QuillSync;
  const wsUrl = resolveWsUrl();
  setSyncStatus('connecting');
  initialSyncReady = false;

  const localDoc = new Y.Doc();
  const localProvider = new WebsocketProvider(wsUrl, room, localDoc);
  const localMap = localDoc.getMap('quill-v2');

  syncDoc = localDoc;
  syncProvider = localProvider;
  syncMap = localMap;

  const isStillCurrent = () => syncProvider === localProvider;

  localProvider.on('status', (e) => {
    if (!isStillCurrent()) return;
    setSyncStatus(e.status);
  });
  localProvider.on('connection-error', (e) => {
    if (!isStillCurrent()) return;
    console.warn('WS connection-error', e);
  });

  try {
    localProvider.awareness.setLocalStateField('user', {
      color: state.toolSettings.pen.color || '#5b8c5a',
    });
    localProvider.awareness.on('change', () => {
      if (!isStillCurrent()) return;
      try {
        const states = localProvider.awareness.getStates();
        document.getElementById('sync-peers-count').textContent = Math.max(0, states.size - 1);
      } catch (_) {}
      // Repaint to pick up any peer's liveStroke change.
      renderActiveOverlay();
    });
  } catch (e) { console.warn('Awareness setup failed:', e); }

  localMap.observe((evt, transaction) => {
    if (!isStillCurrent()) return;
    if (transaction.local) return;
    applyRemoteState();
  });

  // After initial sync from the server, reconcile.
  // If the room already has state, apply it. Otherwise push our local state to seed the room.
  localProvider.once('sync', (isSynced) => {
    if (!isStillCurrent()) return;
    initialSyncReady = true;
    if (localMap.get('state')) {
      applyRemoteState();
    } else {
      pushToSync();
    }
  });
  // Fallback in case 'sync' isn't emitted (older provider versions)
  setTimeout(() => {
    if (!isStillCurrent() || initialSyncReady) return;
    initialSyncReady = true;
    if (localMap.get('state')) applyRemoteState();
    else pushToSync();
  }, 2500);
}

function syncDisconnect() {
  if (syncProvider) { try { syncProvider.destroy(); } catch (_) {} syncProvider = null; }
  if (syncDoc)      { try { syncDoc.destroy(); }      catch (_) {} syncDoc = null; }
  syncMap = null;
  initialSyncReady = false;
  syncSent = 0;
  syncReceived = 0;
  updateSyncCounters();
  setSyncStatus('idle');
  const peers = document.getElementById('sync-peers-count');
  if (peers) peers.textContent = '0';
  const force = document.getElementById('sync-force-push');
  if (force) force.disabled = true;
}

function wireSyncUI() {
  const btn = document.getElementById('sync-connect-btn');
  const force = document.getElementById('sync-force-push');
  const roomInput = document.getElementById('sync-room');
  if (!btn || !roomInput) return;
  btn.disabled = false;
  btn.addEventListener('click', () => {
    if (syncProvider) {
      syncDisconnect();
    } else {
      const room = (roomInput.value || 'my-notes').trim();
      syncConnect(room);
      if (force) force.disabled = false;
    }
  });
  if (force) {
    force.addEventListener('click', () => {
      if (!syncMap) { flashStatus('Not connected'); return; }
      console.log('[sync] manual force push');
      // Manual push bypasses isApplyingRemote/initialSyncReady safeguards
      // because the user explicitly asked for it.
      try {
        const json = JSON.stringify(snapshotState());
        syncMap.set('state', json);
        syncSent += 1;
        updateSyncCounters();
        flashStatus('Pushed (' + (json.length / 1024).toFixed(1) + ' KB)');
        console.log('[sync] manual push', json.length, 'bytes');
      } catch (e) {
        flashStatus('Manual push failed: ' + (e.message || e));
      }
    });
  }
  roomInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      btn.click();
    }
  });
}

if (window.QuillSync) {
  wireSyncUI();
} else {
  window.addEventListener('quill-sync-ready', wireSyncUI, { once: true });
}

// ============================================================
// Date stamp — "Today" button drops a styled text element with current date
// ============================================================
function formatDateStamp(d) {
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}
function insertDateStamp() {
  const view = state.view;
  const cx = (canvas.clientWidth / 2 - view.x) / view.scale;
  const cy = (canvas.clientHeight / 2 - view.y) / view.scale;
  snapshot();
  const el = {
    id: uid(), type: 'text',
    style: 'sticky',
    x: cx - 90, y: cy - 18, w: 200,
    color: '#5b4a1f',
    bgColor: '#fef3c7',
    content: formatDateStamp(new Date()),
  };
  currentPage().elements.push(el);
  render(); save();
  flashStatus('Date inserted');
}

// ============================================================
// Theme (light / dark)
// ============================================================
const THEME_KEY = 'quill-theme';
function loadTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved === 'dark')      document.documentElement.classList.add('dark');
  else if (saved === 'light') document.documentElement.classList.remove('dark');
  else {
    // Match OS preference on first load
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.classList.add('dark');
    }
  }
}
function toggleTheme() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem(THEME_KEY, isDark ? 'dark' : 'light');
  render();
}

// ============================================================
// Snap-to-grid (used by shape tool when on a grid template)
// ============================================================
function snapToGrid(p) {
  const page = currentPage();
  const tpl = (page && page.template) || 'lined';
  let spacing = 0;
  if      (tpl === 'grid' || tpl === 'dots') spacing = 24;
  else if (tpl === 'squares')                spacing = 40;
  else if (tpl === 'isometric')              spacing = 14; // half of 28-step
  else return p;
  // Hard snap to nearest grid intersection when on a grid template
  return {
    x: Math.round(p.x / spacing) * spacing,
    y: Math.round(p.y / spacing) * spacing,
  };
}

// ============================================================
// Export to PDF — uses the browser's print dialog. The @media print
// stylesheet hides the chrome so only the canvas is on the printed page.
// ============================================================
function exportToPdf() {
  activeDraw = null;
  isPointerDown = false;
  // Reset to default zoom for the cleanest output, restore after print.
  const savedView = { ...state.view };
  state.view = { x: 0, y: 0, scale: 1 };
  updateZoomDisplay();
  render();
  const restore = () => {
    window.removeEventListener('afterprint', restore);
    state.view = savedView;
    updateZoomDisplay();
    render();
  };
  window.addEventListener('afterprint', restore);
  // Small delay so the canvas redraw paints before the print dialog opens
  setTimeout(() => window.print(), 80);
}

// ============================================================
// Share modal — QR + LAN URL
// ============================================================
async function refreshShareModal() {
  const roomInput = document.getElementById('share-room-input');
  const urlEl     = document.getElementById('share-url-text');
  const qrEl      = document.getElementById('share-qr');
  let info;
  try {
    const r = await fetch('/api/info', { cache: 'no-store' });
    info = await r.json();
  } catch (e) {
    info = { lanIp: null, url: location.origin + '/', port: parseInt(location.port || '80', 10) };
  }
  const room = (roomInput.value || 'my-notes').trim();
  const baseUrl = (info && info.url) ? info.url : (location.origin + '/');
  const fullUrl = baseUrl + '?room=' + encodeURIComponent(room);
  urlEl.textContent = fullUrl;
  qrEl.innerHTML = '';
  if (typeof window.qrcode === 'function') {
    try {
      const qr = window.qrcode(0, 'M');
      qr.addData(fullUrl);
      qr.make();
      qrEl.innerHTML = qr.createImgTag(6, 0);
      const img = qrEl.querySelector('img');
      if (img) {
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.imageRendering = 'pixelated';
      }
    } catch (e) {
      qrEl.innerHTML = '<span class="qr-placeholder">QR error: ' + (e.message || e) + '</span>';
    }
  } else {
    qrEl.innerHTML = '<span class="qr-placeholder">QR library not loaded</span>';
  }
}
function openShareModal() {
  const modal     = document.getElementById('share-modal');
  const roomInput = document.getElementById('share-room-input');
  const syncRoomInput = document.getElementById('sync-room');
  roomInput.value = (syncRoomInput && syncRoomInput.value) || 'my-notes';
  document.getElementById('share-copied').innerHTML = '&nbsp;';
  modal.classList.add('open');
  refreshShareModal();
}
function closeShareModal() {
  document.getElementById('share-modal').classList.remove('open');
}

// ============================================================
// Wire up new buttons (Share, Export PDF, Theme toggle) + URL ?room=
// ============================================================
(function wireFeatureButtons() {
  const shareBtn = document.getElementById('share-btn');
  if (shareBtn) shareBtn.addEventListener('click', openShareModal);
  const closeBtn = document.getElementById('share-close-btn');
  if (closeBtn) closeBtn.addEventListener('click', closeShareModal);
  const roomInput = document.getElementById('share-room-input');
  if (roomInput) {
    let dbTimer = null;
    roomInput.addEventListener('input', () => {
      clearTimeout(dbTimer);
      dbTimer = setTimeout(refreshShareModal, 180);
    });
  }
  const copyBtn = document.getElementById('share-copy-btn');
  if (copyBtn) copyBtn.addEventListener('click', async () => {
    const url = document.getElementById('share-url-text').textContent;
    const toast = document.getElementById('share-copied');
    try {
      await navigator.clipboard.writeText(url);
      toast.textContent = '✓ Copied!';
      setTimeout(() => { toast.innerHTML = '&nbsp;'; }, 1800);
    } catch (e) {
      toast.textContent = 'Copy failed — select the URL and copy manually';
    }
  });
  const modal = document.getElementById('share-modal');
  if (modal) modal.addEventListener('click', (e) => {
    if (e.target.id === 'share-modal') closeShareModal();
  });
  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal && modal.classList.contains('open')) {
      closeShareModal();
    }
  });

  const exportBtn = document.getElementById('export-pdf-btn');
  if (exportBtn) exportBtn.addEventListener('click', exportToPdf);

  const todayBtn = document.getElementById('today-btn');
  if (todayBtn) todayBtn.addEventListener('click', insertDateStamp);

  const themeBtn = document.getElementById('theme-toggle');
  if (themeBtn) themeBtn.addEventListener('click', toggleTheme);

  // If the page was opened with ?room=xxx (e.g. via the QR scan on iPad),
  // pre-fill the sync room and auto-connect once the sync library is ready.
  const urlRoom = new URLSearchParams(location.search).get('room');
  if (urlRoom) {
    const syncRoom = document.getElementById('sync-room');
    if (syncRoom) syncRoom.value = urlRoom;
    const autoConnect = () => {
      const btn = document.getElementById('sync-connect-btn');
      if (btn && !btn.disabled && btn.textContent === 'Connect') {
        // Slight delay so the local state loads before connecting
        setTimeout(() => btn.click(), 300);
      }
    };
    if (window.QuillSync) autoConnect();
    else window.addEventListener('quill-sync-ready', autoConnect, { once: true });
  }
})();

// loadTheme() is called early in the init block above. Nothing more to do here.
</script>
